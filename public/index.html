<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام إدارة السنتر التعليمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --bg: #0f172a; --bg2: #1e293b; --card: #1e293b; --border: #334155; --text: #f1f5f9; --text2: #94a3b8; --accent: #38bdf8; --accent2: #0ea5e9; --success: #4ade80; --danger: #f87171; --warn: #fbbf24; --r: 10px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    
    /* Sidebar */
    .sidebar { width: 250px; background: var(--bg2); border-left: 1px solid var(--border); height: 100vh; position: fixed; right: 0; display: flex; flex-direction: column; transition: transform 0.3s; z-index: 100; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; }
    .sidebar-header h2 { font-size: 18px; color: var(--accent); }
    .nav { flex: 1; overflow-y: auto; padding: 10px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: var(--r); cursor: pointer; margin-bottom: 5px; color: var(--text2); transition: 0.2s; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: var(--accent); color: #000; font-weight: 700; }
    .nav-item i { width: 20px; text-align: center; }
    
    /* Main Content */
    .main { margin-right: 250px; flex: 1; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 20px; }
    .user-badge { background: var(--card); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); font-size: 13px; }
    
    /* Cards & Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--r); }
    .stat-card h3 { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
    .stat-card p { font-size: 24px; font-weight: 800; color: var(--accent); }
    
    /* Forms & Tables */
    .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--r); margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    
    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
    .form-control { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; }
    .form-control:focus { outline: none; border-color: var(--accent); }
    
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
    th { background: var(--bg); color: var(--text2); font-weight: 600; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
    .bg-success { background: rgba(74, 222, 128, 0.2); color: var(--success); }
    .bg-danger { background: rgba(248, 113, 113, 0.2); color: var(--danger); }
    .bg-warn { background: rgba(251, 191, 36, 0.2); color: var(--warn); }

    /* Login Page */
    .login-container { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 999; }
    .login-box { background: var(--card); padding: 40px; border-radius: var(--r); width: 400px; max-width: 90%; border: 1px solid var(--border); text-align: center; }
    .login-icon { font-size: 40px; color: var(--accent); margin-bottom: 15px; }
    
    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal-backdrop.show { opacity: 1; pointer-events: auto; }
    .modal-content { background: var(--card); padding: 25px; border-radius: var(--r); width: 90%; max-width: 500px; transform: translateY(20px); transition: 0.3s; }
    .modal-backdrop.show .modal-content { transform: translateY(0); }

    @media(max-width: 768px) {
      .sidebar { transform: translateX(100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-right: 0; }
    }
  </style>
</head>
<body>

  <!-- Login Page -->
  <div id="loginPage" class="login-container">
    <div class="login-box">
      <div class="login-icon"><i class="fas fa-graduation-cap"></i></div>
      <h2 style="margin-bottom: 20px">نظام إدارة السنتر</h2>
      <div class="form-group">
        <input type="text" id="loginUser" class="form-control" placeholder="المستخدم (admin أو رقم الطالب)">
      </div>
      <div class="form-group">
        <input type="password" id="loginPass" class="form-control" placeholder="كلمة السر">
      </div>
      <button class="btn btn-primary" style="width: 100%" onclick="doLogin()">دخول</button>
      <div id="loginErr" style="color:var(--danger); margin-top:10px; font-size:12px"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><h2 id="sideTitle">لوحة التحكم</h2></div>
      <nav class="nav" id="navMenu"></nav>
      <div style="padding: 10px; border-top: 1px solid var(--border)">
        <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</div>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div style="display:flex; align-items:center; gap:10px">
          <button class="btn btn-outline" onclick="toggleSidebar()" style="display:none" id="menuBtn"><i class="fas fa-bars"></i></button>
          <h1 id="pageTitle">الرئيسية</h1>
        </div>
        <div class="user-badge"><i class="fas fa-user"></i> <span id="userName">المستخدم</span></div>
      </header>
      
      <div id="contentArea"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-backdrop" onclick="if(event.target === this) closeModal()">
    <div class="modal-content" id="modalBody"></div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════
// CORE FUNCTIONS
// ═══════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const state = { role: null, user: null, sid: null, cache: [] };
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

async function api(url, data = {}) {
  const opts = { headers: { 'Content-Type': 'application/json' } };
  if (Object.keys(data).length > 0) { opts.method = 'POST'; opts.body = JSON.stringify(data); }
  try {
    const res = await fetch('/api/' + url, opts);
    return await res.json();
  } catch (e) { console.error(e); return { success: false, message: 'Network Error' }; }
}

function navigateTo(id) {
  document.querySelectorAll('.section').forEach(el => el.style.display = 'none');
  const sec = $(id);
  if (sec) sec.style.display = 'block';
  
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const activeNav = document.querySelector(`[onclick="navigateTo('${id}')"]`);
  if (activeNav) activeNav.classList.add('active');
  
  if(window.innerWidth <= 768) $('sidebar').classList.remove('open');
  
  // Loaders
  if (id === 'dash') loadDashboard();
  if (id === 'students') loadStudents();
  if (id === 'payments') loadPayments();
  if (id === 'grades') loadGrades();
  if (id === 'schedules') loadSchedules();
  if (id === 'excuses') loadExcuses();
  if (id === 'attendance') loadAttendance();
  
  if (id === 'sDash') loadStudentDash();
  if (id === 'sProfile') loadStudentProfile();
  if (id === 'sGrades') loadStudentGrades();
  if (id === 'sPayments') loadStudentPayments();
  if (id === 'sSched') loadStudentSchedules();
}

function toggleSidebar() { $('sidebar').classList.toggle('open'); }
function showModal(html) { $('modalBody').innerHTML = html; $('modal').classList.add('show'); }
function closeModal() { $('modal').classList.remove('show'); }

// ═══════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════
async function doLogin() {
  const user = $('loginUser').value;
  const pass = $('loginPass').value;
  const role = user === 'admin' ? 'admin' : 'student';
  
  const res = await api('verifyLogin', { role, user, pass });
  if (res.success) {
    state.role = res.data.role;
    state.user = res.data.name;
    state.sid = res.data.studentId;
    
    $('loginPage').style.display = 'none';
    $('mainApp').style.display = 'flex';
    $('userName').textContent = state.user;
    
    buildNav();
    navigateTo(state.role === 'admin' ? 'dash' : 'sDash');
  } else {
    $('loginErr').textContent = res.message;
  }
}

function logout() { location.reload(); }

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function buildNav() {
  const adminMenu = `
    <div class="nav-item active" onclick="navigateTo('dash')"><i class="fas fa-home"></i> الرئيسية</div>
    <div class="nav-item" onclick="navigateTo('students')"><i class="fas fa-users"></i> الطلاب</div>
    <div class="nav-item" onclick="navigateTo('payments')"><i class="fas fa-money-bill"></i> المدفوعات</div>
    <div class="nav-item" onclick="navigateTo('grades')"><i class="fas fa-star"></i> الدرجات</div>
    <div class="nav-item" onclick="navigateTo('schedules')"><i class="fas fa-clock"></i> المواعيد</div>
    <div class="nav-item" onclick="navigateTo('excuses')"><i class="fas fa-envelope"></i> الاعتذارات</div>
    <div class="nav-item" onclick="navigateTo('attendance')"><i class="fas fa-calendar-check"></i> الحضور</div>
  `;
  const studentMenu = `
    <div class="nav-item active" onclick="navigateTo('sDash')"><i class="fas fa-home"></i> الرئيسية</div>
    <div class="nav-item" onclick="navigateTo('sProfile')"><i class="fas fa-user"></i> بروفايلي</div>
    <div class="nav-item" onclick="navigateTo('sGrades')"><i class="fas fa-star"></i> درجاتي</div>
    <div class="nav-item" onclick="navigateTo('sPayments')"><i class="fas fa-money-bill"></i> مدفوعاتي</div>
    <div class="nav-item" onclick="navigateTo('sSched')"><i class="fas fa-clock"></i> مواعيدي</div>
  `;
  $('navMenu').innerHTML = state.role === 'admin' ? adminMenu : studentMenu;
  
  // Init Sections
  $('contentArea').innerHTML = state.role === 'admin' ? `
    <div id="dash" class="section"></div>
    <div id="students" class="section"></div>
    <div id="payments" class="section"></div>
    <div id="grades" class="section"></div>
    <div id="schedules" class="section"></div>
    <div id="excuses" class="section"></div>
    <div id="attendance" class="section"></div>
  ` : `
    <div id="sDash" class="section"></div>
    <div id="sProfile" class="section"></div>
    <div id="sGrades" class="section"></div>
    <div id="sPayments" class="section"></div>
    <div id="sSched" class="section"></div>
  `;
}

// ═══════════════════════════════════════════════════════════
// ADMIN PAGES
// ═══════════════════════════════════════════════════════════
async function loadDashboard() {
  const d = await api('dashboard');
  if (!d.success) return;
  $('dash').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><h3>إجمالي الطلاب</h3><p>${d.data.totalStudents}</p></div>
      <div class="stat-card"><h3>الطلاب النشطين</h3><p style="color:var(--success)">${d.data.activeStudents}</p></div>
      <div class="stat-card"><h3>إجمالي المدفوعات</h3><p style="color:var(--warn)">${d.data.totalPaid}</p></div>
      <div class="stat-card"><h3>الشهر الحالي</h3><p style="font-size:18px">${d.data.currentMonth}</p></div>
    </div>
  `;
}

// Students
async function loadStudents() {
  const res = await api('students');
  state.cache = res.data || [];
  $('students').innerHTML = `
    <div class="card">
      <div class="card-header"><h3>إضافة طالب</h3></div>
      <div class="form-grid">
        <div class="form-group"><label>الاسم</label><input type="text" class="form-control" id="sName"></div>
        <div class="form-group"><label>الصف</label><input type="text" class="form-control" id="sGrade"></div>
        <div class="form-group"><label>المجموعة</label><input type="text" class="form-control" id="sGroup"></div>
        <div class="form-group"><label>الاشتراك</label><input type="number" class="form-control" id="sSubs"></div>
        <div class="form-group"><label>واتساب</label><input type="text" class="form-control" id="sWa"></div>
        <div class="form-group"><label>الحالة</label><select class="form-control" id="sStatus"><option value="نشط">نشط</option><option value="غير نشط">غير نشط</option></select></div>
      </div>
      <button class="btn btn-primary" onclick="addStudent()"><i class="fas fa-plus"></i> إضافة</button>
    </div>
    <div class="card">
      <div class="card-header"><h3>قائمة الطلاب (${state.cache.length})</h3></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>كود</th><th>اسم</th><th>الصف</th><th>المجموعة</th><th>الاشتراك</th><th>واتساب</th><th>حالة</th><th></th></tr></thead>
        <tbody>
          ${state.cache.map(s => `
            <tr>
              <td>${s.id}</td><td>${s.name}</td><td>${s.grade}</td><td>${s.group}</td><td>${s.subscription}</td>
              <td>${s.whatsapp}</td><td><span class="badge ${s.status.includes('نشط') ? 'bg-success' : 'bg-danger'}">${s.status}</span></td>
              <td><button class="btn btn-outline" onclick="editStudent(${s.id})"><i class="fas fa-edit"></i></button></td>
            </tr>
          `).join('')}
        </tbody>
      </table></div>
    </div>
  `;
}
async function addStudent() {
  await api('students/add', { name: $('sName').value, grade: $('sGrade').value, group: $('sGroup').value, subscription: $('sSubs').value, whatsapp: $('sWa').value, status: $('sStatus').value });
  loadStudents();
}
async function editStudent(id) {
  const s = state.cache.find(x => x.id == id);
  showModal(`
    <h3 style="margin-bottom:15px">تعديل طالب</h3>
    <div class="form-grid">
      <div class="form-group"><label>الاسم</label><input type="text" class="form-control" id="eName" value="${s.name}"></div>
      <div class="form-group"><label>الصف</label><input type="text" class="form-control" id="eGrade" value="${s.grade}"></div>
      <div class="form-group"><label>المجموعة</label><input type="text" class="form-control" id="eGroup" value="${s.group}"></div>
      <div class="form-group"><label>الاشتراك</label><input type="number" class="form-control" id="eSubs" value="${s.subscription}"></div>
      <div class="form-group"><label>واتساب</label><input type="text" class="form-control" id="eWa" value="${s.whatsapp}"></div>
      <div class="form-group"><label>الحالة</label><select class="form-control" id="eStatus"><option value="نشط" ${s.status=='نشط'?'selected':''}>نشط</option><option value="غير نشط" ${s.status=='غير نشط'?'selected':''}>غير نشط</option></select></div>
    </div>
    <button class="btn btn-primary" onclick="saveStudent(${id})">حفظ</button>
    <button class="btn btn-danger" onclick="deleteStudent(${id})" style="float:left">حذف</button>
  `);
}
async function saveStudent(id) {
  await api('students/update', { id, name: $('eName').value, grade: $('eGrade').value, group: $('eGroup').value, subscription: $('eSubs').value, whatsapp: $('eWa').value, status: $('eStatus').value });
  closeModal(); loadStudents();
}
async function deleteStudent(id) {
  if(confirm('هل تريد الحذف؟')) {
    await api('students/delete', { id });
    closeModal(); loadStudents();
  }
}

// Payments
async function loadPayments() {
  const res = await api('payments');
  const list = res.data || [];
  $('payments').innerHTML = `
    <div class="card"><div class="card-header"><h3>سجل المدفوعات</h3></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>اسم</th><th>مجموعة</th><th>شهر</th><th>اشتراك</th><th>مدفوع</th><th>متبقي</th><th>حالة</th></tr></thead>
      <tbody>
        ${list.map(p => `
          <tr>
            <td>${p.name}</td><td>${p.group}</td><td>${p.monthYear}</td><td>${p.subscription}</td><td>${p.paid}</td>
            <td>${p.remaining}</td><td><span class="badge ${p.status.includes('مكتمل') ? 'bg-success' : 'bg-warn'}">${p.status}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
    </div>
  `;
}

// Grades
async function loadGrades() {
  const res = await api('grades');
  const list = res.data || [];
  $('grades').innerHTML = `
    <div class="card"><div class="card-header"><h3>الدرجات</h3></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>كود</th><th>اسم</th><th>امتحان 1</th><th>امتحان 2</th><th>امتحان 3</th><th>امتحان 4</th><th>متوسط</th><th>تقدير</th><th></th></tr></thead>
      <tbody>
        ${list.map(g => `
          <tr>
            <td>${g.id}</td><td>${g.name}</td>
            <td><input type="number" class="form-control" style="width:60px;display:inline" value="${g.exam1}" id="g1_${g.id}"></td>
            <td><input type="number" class="form-control" style="width:60px;display:inline" value="${g.exam2}" id="g2_${g.id}"></td>
            <td><input type="number" class="form-control" style="width:60px;display:inline" value="${g.exam3}" id="g3_${g.id}"></td>
            <td><input type="number" class="form-control" style="width:60px;display:inline" value="${g.exam4}" id="g4_${g.id}"></td>
            <td>${g.avg}</td><td>${g.grade}</td>
            <td><button class="btn btn-primary btn-sm" onclick="saveGrade('${g.id}')">حفظ</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
    </div>
  `;
}
async function saveGrade(id) {
  const data = { id, exam1: $('g1_'+id).value, exam2: $('g2_'+id).value, exam3: $('g3_'+id).value, exam4: $('g4_'+id).value, avg: 0, grade: '' };
  await api('grades/update', data);
  loadGrades();
}

// Schedules
async function loadSchedules() {
  const res = await api('schedules');
  const list = res.data || [];
  $('schedules').innerHTML = `
    <div class="card"><div class="card-header"><h3>المواعيد</h3></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>يوم</th><th>وقت</th><th>مجموعة</th><th>مادة</th><th>مدرس</th><th>حالة</th></tr></thead>
      <tbody>
        ${list.map(s => `
          <tr>
            <td>${s.day}</td><td>${s.time}</td><td>${s.group}</td><td>${s.subject}</td><td>${s.teacher}</td>
            <td><span class="badge ${s.status == 'نشط' ? 'bg-success' : 'bg-danger'}">${s.status}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
    </div>
  `;
}

// Excuses
async function loadExcuses() {
  const res = await api('excuses');
  const list = res.data || [];
  $('excuses').innerHTML = `
    <div class="card"><div class="card-header"><h3>الاعتذارات</h3></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>اسم</th><th>سبب</th><th>تاريخ</th><th>حالة</th><th></th></tr></thead>
      <tbody>
        ${list.map(e => `
          <tr>
            <td>${e.studentName}</td><td>${e.reason}</td><td>${e.date}</td>
            <td><span class="badge ${e.status.includes('مقبول') ? 'bg-success' : 'bg-warn'}">${e.status}</span></td>
            <td><button class="btn btn-outline btn-sm" onclick="replyExcuse('${e.id}')">رد</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table></div>
    </div>
  `;
}
async function replyExcuse(id) {
  showModal(`
    <h3>الرد على الاعتذار</h3>
    <div class="form-group"><label>الحالة</label><select class="form-control" id="exStatus"><option value="مقبول">مقبول</option><option value="مرفوض">مرفوض</option></select></div>
    <div class="form-group"><label>الرد</label><textarea class="form-control" id="exReply"></textarea></div>
    <button class="btn btn-primary" onclick="saveExcuse('${id}')">حفظ</button>
  `);
}
async function saveExcuse(id) {
  await api('excuses/update', { id, status: $('exStatus').value, reply: $('exReply').value });
  closeModal(); loadExcuses();
}

// Attendance
async function loadAttendance() {
  const month = MONTHS[new Date().getMonth()];
  const res = await api(`attendance?month=${month}`);
  const list = res.data || [];
  $('attendance').innerHTML = `
    <div class="card"><div class="card-header"><h3>سجل الحضور - ${month}</h3></div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>كود</th><th>اسم</th><th>مجموعة</th>${Array.from({length:31},(_,i)=>`<th>${i+1}</th>`).join('')}</tr></thead>
      <tbody>
        ${list.map(r => `
          <tr>
            <td>${r.id}</td><td>${r.name}</td><td>${r.group}</td>
            ${r.days.map((d, i) => `
              <td><select style="width:40px; font-size:10px; background:${d=='ح'?'var(--success)':d=='غ'?'var(--danger)':'var(--bg)'}; color:${d?'#000':'var(--text)'}" onchange="saveAtt('${r.id}', ${i+1}, this.value)">
                <option value="" ${!d?'selected':''}>-</option>
                <option value="ح" ${d=='ح'?'selected':''}>ح</option>
                <option value="غ" ${d=='غ'?'selected':''}>غ</option>
                <option value="ت" ${d=='ت'?'selected':''}>ت</option>
              </select></td>
            `).join('')}
          </tr>
        `).join('')}
      </tbody>
    </table></div>
    </div>
  `;
}
async function saveAtt(id, day, status) {
  const month = MONTHS[new Date().getMonth()];
  await api('attendance/save', { month, studentId: id, day, status });
  // Reload to update colors
  loadAttendance();
}

async function loadStudentDash() {
  const res = await api('student/profile?id=' + state.sid);
  const d = res.data || {};
  $('sDash').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><h3>مرحباً</h3><p style="font-size:20px">${state.user}</p></div>
      <div class="stat-card"><h3>الصف</h3><p>${d.grade}</p></div>
      <div class="stat-card"><h3>المجموعة</h3><p>${d.group}</p></div>
    </div>
  `;
}

async function loadStudentProfile() {
  const res = await api('student/profile?id=' + state.sid);
  const d = res.data || {};

async function loadStudentGrades() {
  const res = await api('student/grades?id=' + state.sid);

    <div class="card"><div class="card-header"><h3>درجاتي</h3></div>
    <table>
      <thead><tr><th>م1</th><th>م2</th><th>م3</th><th>م4</th><th>المتوسط</th><th>التقدير</th></tr></thead>

async function loadStudentPayments() {
  const res = await api('student/payments?name=' + encodeURIComponent(state.user));
  const list = res.data || [];
  $('sPayments').innerHTML = `
    <div class="card"><div class="card-header"><h3>مدفوعاتي</h3></div>
    <table>
      <thead><tr><th>شهر</th><th>مطلوب</th><th>مدفوع</th><th>متبقي</th><th>حالة</th></tr></thead>
      <tbody>
        ${list.map(p => `
          <tr><td>${p.monthYear}</td><td>${p.subscription}</td><td>${p.paid}</td><td>${p.remaining}</td><td><span class="badge ${p.status.includes('مكتمل') ? 'bg-success' : 'bg-warn'}">${p.status}</span></td></tr>
        `).join('')}
      </tbody>
    </table></div>
  `;
}
