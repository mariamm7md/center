<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070b12">
  <meta name="description" content="نظام إدارة السنتر التعليمي - Center Management System">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <title>نظام إدارة السنتر</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ═══ Design Tokens ═══ */
    :root {
      --bg:#070b12; --bg2:#0c1220; --bg3:#111a2b;
      --card:#0f1825; --card2:#152035; --card3:#1a2740;
      --border:#1c2d48; --border2:#243652;
      --text:#e4e9f2; --text2:#6b7a94; --text3:#4a5a74;
      --accent:#00d4aa; --accent2:#00b894; --accent3:#009e7e;
      --accent-g:rgba(0,212,170,.10); --accent-g2:rgba(0,212,170,.18);
      --gold:#f5c542; --gold-g:rgba(245,197,66,.10);
      --danger:#ff5757; --danger-g:rgba(255,87,87,.10);
      --warn:#ffb347; --warn-g:rgba(255,179,71,.10);
      --info:#4ecdc4; --info-g:rgba(78,205,196,.10);
      --r:14px; --r2:10px; --r3:8px;
      --sh:0 4px 30px rgba(0,0,0,.40); --sh2:0 8px 40px rgba(0,0,0,.50);
      --sb:270px; --hd:62px;
      --fa:'Cairo',sans-serif; --fe:'DM Sans',sans-serif;
    }
    [data-theme="light"] {
      --bg:#f0f2f5; --bg2:#e4e8ee; --bg3:#d8dde5;
      --card:#ffffff; --card2:#f5f7fa; --card3:#eef1f6;
      --border:#d0d7e2; --border2:#bcc5d3;
      --text:#141a24; --text2:#5a6578; --text3:#8a94a6;
      --accent:#00b894; --accent2:#009e7e; --accent3:#008868;
      --accent-g:rgba(0,184,148,.07); --accent-g2:rgba(0,184,148,.14);
      --gold:#e5a800; --gold-g:rgba(229,168,0,.08);
      --danger:#e04040; --danger-g:rgba(224,64,64,.08);
      --warn:#e69500; --warn-g:rgba(230,149,0,.08);
      --info:#00b8a9; --info-g:rgba(0,184,169,.08);
      --sh:0 2px 16px rgba(0,0,0,.06); --sh2:0 6px 24px rgba(0,0,0,.10);
    }

    /* ═══ Reset & Base ═══ */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--fa);background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden}
    [dir="ltr"] body{font-family:var(--fe)}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    a{color:var(--accent);text-decoration:none;transition:.2s}
    a:hover{color:var(--accent2)}
    textarea.fi{resize:vertical;min-height:80px}

    /* ═══ Login Page ═══ */
    #loginPage {
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#050810;position:relative;overflow:hidden;
    }
    [data-theme="light"]#loginPage{background:linear-gradient(150deg,#e8f5f0 0%,#f0f2f5 40%,#f5f0e5 100%)}
    .login-bg-grid {
      position:absolute;inset:0;
      background-image:linear-gradient(rgba(0,212,170,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.03) 1px,transparent 1px);
      background-size:60px 60px;animation:gridMove 20s linear infinite;
    }
    @keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
    .login-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 12s ease-in-out infinite}
    .login-orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(0,212,170,.15),transparent 70%);top:-100px;right:-50px}
    .login-orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(245,197,66,.08),transparent 70%);bottom:-80px;left:-60px;animation-delay:-6s}
    .login-orb-3{width:200px;height:200px;background:radial-gradient(circle,rgba(78,205,196,.08),transparent 70%);top:40%;left:30%;animation-delay:-3s}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-15px,15px) scale(.97)}}

    .lc {
      background:rgba(15,24,37,.80);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:22px;padding:40px 36px;
      width:420px;max-width:92vw;position:relative;z-index:2;
      box-shadow:var(--sh2),0 0 80px rgba(0,212,170,.04);
      animation:cardIn .6s cubic-bezier(.16,1,.3,1);
    }
    [data-theme="light"] .lc{background:rgba(255,255,255,.85);box-shadow:var(--sh2)}
    @keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .lc-logo{text-align:center;margin-bottom:32px}
    .lc-logo-icon{width:64px;height:64px;margin:0 auto 14px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 8px 24px rgba(0,212,170,.25)}
    .lc-logo h2{font-size:19px;font-weight:800}
    .lc-logo p{font-size:12px;color:var(--text2);margin-top:4px}

    .rtabs{display:flex;gap:4px;margin-bottom:26px;background:var(--bg2);border-radius:12px;padding:4px;border:1px solid var(--border)}
    .rtab{flex:1;padding:11px;text-align:center;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px;transition:.3s;color:var(--text2);border:none;background:none;font-family:inherit}
    .rtab.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(0,212,170,.3)}
    .rtab:hover:not(.on){color:var(--text);background:var(--accent-g)}

    .fg{margin-bottom:16px}
    .fg label{display:block;margin-bottom:6px;font-size:12px;font-weight:600;color:var(--text2)}
    .fi{width:100%;padding:12px 14px;border-radius:var(--r3);border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;transition:.3s;outline:none}
    .fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);background:var(--bg3)}
    .fi::placeholder{color:var(--text3)}
    select.fi{appearance:auto}

    .bp{width:100%;padding:13px;border:none;border-radius:var(--r3);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.3s;margin-top:8px;position:relative;overflow:hidden}
    .bp::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.12));opacity:0;transition:.3s}
    .bp:hover::before{opacity:1}
    .bp:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,212,170,.30)}
    .bp:active{transform:translateY(0)}
    .bp:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}

    .le{color:var(--danger);font-size:12px;text-align:center;margin-top:10px;display:none;font-weight:600}
    .lh{color:var(--text3);font-size:11px;text-align:center;margin-top:16px;line-height:1.7}

    /* ═══ Main App Layout ═══ */
    #mainApp{display:none;min-height:100vh}
    .app-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .app-bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,170,.04),transparent 70%);top:-200px;right:-100px;border-radius:50%}
    .app-bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(245,197,66,.03),transparent 70%);bottom:-100px;left:-50px;border-radius:50%}

    /* ═══ Sidebar ═══ */
    #sidebar{position:fixed;top:0;right:0;width:var(--sb);height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1)}
    [dir="ltr"]#sidebar{right:auto;left:0;border-left:none;border-right:1px solid var(--border)}
    .sb-h{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .sb-h-icon{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
    .sb-h-text{flex:1;overflow:hidden}
    .sb-h-text span{font-weight:700;font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-h-text small{font-size:11px;color:var(--text2)}
    .sb-nav{flex:1;overflow-y:auto;padding:12px 8px}
    .sb-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:12px 14px 6px}
    .ni{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r3);cursor:pointer;transition:.25s;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:2px;border:none;background:none;width:100%;text-align:inherit;font-family:inherit;position:relative}
    .ni:hover{background:var(--accent-g);color:var(--text)}
    .ni.on{background:var(--accent-g2);color:var(--accent);font-weight:700}
    .ni.on::before{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
    [dir="ltr"] .ni.on::before{right:auto;left:0;border-radius:3px 0 0 3px}
    .ni i{width:18px;text-align:center;font-size:14px;flex-shrink:0}
    .ni.on i{color:var(--accent)}
    .sb-f{padding:10px 8px;border-top:1px solid var(--border)}
    .sb-f .ni{color:var(--danger)}
    .sb-f .ni:hover{background:var(--danger-g)}
    .sb-f .ni i{color:var(--danger)}

    /* ═══ Top Header ═══ */
    #topH{position:fixed;top:0;right:var(--sb);left:0;height:var(--hd);background:rgba(15,24,37,.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;transition:right .35s,left .35s}
    [data-theme="light"] #topH{background:rgba(255,255,255,.80)}
    [dir="ltr"]#topH{right:0;left:var(--sb)}
    .h-l{display:flex;align-items:center;gap:14px}
    .ham{display:none;background:none;border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;padding:6px 8px;border-radius:var(--r3);transition:.2s}
    .ham:hover{border-color:var(--accent);color:var(--accent)}
    .pt{font-weight:700;font-size:16px}
    .h-r{display:flex;align-items:center;gap:8px}
    .hb{width:38px;height:38px;border-radius:var(--r3);border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s;font-size:14px}
    .hb:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-g)}
    .ub{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--accent-g);border:1px solid rgba(0,212,170,.15);border-radius:var(--r3);font-size:12px;font-weight:600;color:var(--accent)}
    .ub i{font-size:13px}
    .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;margin-inline-end:6px;animation:pulse 2s infinite}
    .conn-dot.off{background:var(--danger);animation:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ═══ Main Content ═══ */
    #mc{margin-top:var(--hd);margin-inline-start:var(--sb);padding:24px;min-height:calc(100vh - var(--hd));transition:margin .35s;position:relative;z-index:1}
    .sec{display:none;animation:fadeUp .35s ease-out}
    .sec.on{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* ═══ Toast ═══ */
    #toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .tst{padding:12px 24px;border-radius:var(--r3);font-size:13px;font-weight:600;min-width:280px;text-align:center;box-shadow:var(--sh2);animation:toastIn .35s cubic-bezier(.16,1,.3,1);pointer-events:auto;font-family:var(--fa);display:flex;align-items:center;justify-content:center;gap:8px}
    .tst.s{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .tst.e{background:linear-gradient(135deg,var(--danger),#cc3b3b);color:#fff}
    .tst i{font-size:15px}
    @keyframes toastIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* ═══ Loader ═══ */
    #loader{position:fixed;inset:0;background:rgba(7,11,18,.80);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:16px}
    [data-theme="light"]#loader{background:rgba(240,242,245,.80)}
    .sp{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .lt{color:var(--text2);font-size:13px;font-weight:500}

    /* ═══ Stats Grid ═══ */
    .sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;margin-bottom:28px}
    .sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:.3s;position:relative;overflow:hidden}
    .sc:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:var(--border2)}
    .sc::before{content:'';position:absolute;top:0;right:0;width:100%;height:3px;background:var(--accent)}
    .sc.gd::before{background:var(--gold)}
    .sc.dg::before{background:var(--danger)}
    .sc.ig::before{background:var(--info)}
    .sc.wg::before{background:var(--warn)}
    .sc::after{content:'';position:absolute;top:-20px;left:-20px;width:80px;height:80px;background:var(--accent-g);border-radius:50%;opacity:0;transition:.3s}
    .sc:hover::after{opacity:1}
    .sc.gd::after{background:var(--gold-g)}
    .sc.dg::after{background:var(--danger-g)}
    .sc.ig::after{background:var(--info-g)}
    .sc.wg::after{background:var(--warn-g)}
    .si{font-size:18px;color:var(--accent);margin-bottom:10px;position:relative;z-index:1}
    .sc.gd .si{color:var(--gold)}
    .sc.dg .si{color:var(--danger)}
    .sc.ig .si{color:var(--info)}
    .sc.wg .si{color:var(--warn)}
    .sl{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;letter-spacing:.3px;position:relative;z-index:1}
    .sv{font-size:28px;font-weight:900;position:relative;z-index:1;letter-spacing:-.5px}

    /* ═══ Card ═══ */
    .cd{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:20px;transition:.3s}
    .cd:hover{border-color:var(--border2)}
    .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
    .ct{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
    .ct i{color:var(--accent);font-size:16px}
    .ct-icon{width:32px;height:32px;border-radius:var(--r3);background:var(--accent-g);display:flex;align-items:center;justify-content:center}
    .ct-icon i{color:var(--accent);font-size:13px;margin:0}
    .fr{display:flex;flex-wrap:wrap;gap:12px}
    .fr .fg{flex:1;min-width:160px}
    .fr .fi{width:100%}

    /* ═══ Buttons ═══ */
    .btn{padding:9px 18px;border-radius:var(--r3);border:none;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.25s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.2px;white-space:nowrap}
    .ba{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .ba:hover{box-shadow:0 4px 16px rgba(0,212,170,.3);transform:translateY(-1px)}
    .bd{background:var(--danger);color:#fff}
    .bd:hover{box-shadow:0 4px 16px rgba(255,87,87,.3);opacity:.9}
    .bo{background:transparent;border:1px solid var(--border);color:var(--text2)}
    .bo:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-g)}
    .bs{padding:6px 10px;font-size:11px;border-radius:6px}
    .bgrp{display:flex;gap:6px;flex-wrap:wrap}

    /* ═══ Table ═══ */
    .tw{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead{background:var(--bg2)}
    th{padding:11px 14px;text-align:center;font-weight:700;color:var(--text2);font-size:11px;white-space:nowrap;border-bottom:1px solid var(--border);letter-spacing:.3px}
    td{padding:10px 14px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr{transition:.15s}
    tbody tr:hover{background:var(--accent-g)}
    tbody tr:last-child td{border-bottom:none}
    .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
    .bp-s{background:var(--accent-g);color:var(--accent)}
    .ba-s{background:var(--danger-g);color:var(--danger)}
    .bw-s{background:var(--warn-g);color:var(--warn)}

    /* ═══ Modal ═══ */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.50);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:1000}
    .modal.show{display:flex}
    .mb{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh2);animation:modalIn .3s cubic-bezier(.16,1,.3,1)}
    @keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .mt{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .mt i{color:var(--accent)}
    .ma{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
    .mdesc{color:var(--text2);font-size:13px;line-height:1.8;margin:16px 0}

    /* ═══ Alert Card ═══ */
    .ac{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:10px;border-inline-start:4px solid var(--danger);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;transition:.2s}
    .ac:hover{box-shadow:var(--sh)}

    /* ═══ Schedule Card ═══ */
    .skc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;transition:.25s}
    .skc:hover{border-color:var(--accent);box-shadow:var(--sh)}
    .skd{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:8px 16px;border-radius:var(--r3);font-weight:700;font-size:13px;white-space:nowrap}
    .ski{flex:1;display:flex;gap:20px;flex-wrap:wrap;font-size:12px}
    .ski span{display:flex;align-items:center;gap:6px;color:var(--text2)}
    .ski span i{color:var(--accent);font-size:11px}
    .skc.cancel{opacity:.4;text-decoration:line-through}

    /* ═══ Download Card ═══ */
    .dlc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;transition:.25s;cursor:pointer}
    .dlc:hover{border-color:var(--accent);background:var(--accent-g);transform:translateX(-3px)}
    [dir="ltr"] .dlc:hover{transform:translateX(3px)}
    .dlc span{font-weight:600;font-size:13px;display:flex;align-items:center;gap:10px}
    .dlc span i{color:var(--accent)}

    /* ═══ Quick Actions ═══ */
    .qa{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
    .qab{padding:18px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);cursor:pointer;transition:.3s;text-align:center;font-family:inherit;color:var(--text)}
    .qab:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--sh);background:var(--accent-g)}
    .qab i{font-size:24px;color:var(--accent);display:block;margin-bottom:8px}
    .qab span{font-size:12px;font-weight:600}

    /* ═══ Profile Header ═══ */
    .ph{display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap}
    .pav{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:900;flex-shrink:0;box-shadow:0 8px 24px rgba(0,212,170,.25)}
    .pn{font-size:22px;font-weight:900;letter-spacing:-.3px}
    .ps{color:var(--text2);font-size:13px;margin-top:2px}

    /* ═══ Attendance Grid ═══ */
    .ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:5px;margin:16px 0}
    .ad{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--card2);transition:.2s}
    .ad .dn{font-size:10px;color:var(--text2);margin-bottom:1px}
    .ad.p{background:var(--accent-g);border-color:var(--accent);color:var(--accent)}
    .ad.a{background:var(--danger-g);border-color:var(--danger);color:var(--danger)}
    .ad.l{background:var(--warn-g);border-color:var(--warn);color:var(--warn)}
    .ad.today{box-shadow:0 0 0 2px var(--accent),0 0 12px rgba(0,212,170,.2)}

    /* ═══ Attendance Table Cells ═══ */
    .atd{width:34px;min-width:34px;padding:3px 1px !important}
    .ats{width:100%;padding:2px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:11px;text-align:center;cursor:pointer;transition:.2s}
    .ats:focus{border-color:var(--accent);outline:none}
    .ats.changed{border-color:var(--accent);background:var(--accent-g)}

    /* ═══ Empty State ═══ */
    .empty{text-align:center;padding:50px 20px;color:var(--text2)}
    .empty i{font-size:48px;margin-bottom:16px;opacity:.15;display:block}
    .empty p{font-size:13px;font-weight:500}

    /* ═══ Changed Counter ═══ */
    .chg-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:var(--accent-g);color:var(--accent);font-size:11px;font-weight:700;animation:pulse 1.5s infinite}

    /* ═══ Responsive ═══ */
    @media(max-width:768px){
      #sidebar{transform:translateX(100%)}
      #sidebar.open{transform:translateX(0)}
      [dir="ltr"]#sidebar{transform:translateX(-100%)}
      [dir="ltr"]#sidebar.open{transform:translateX(0)}
      #topH{right:0!important;left:0!important}
      #mc{margin-inline-start:0!important;padding:16px}
      .ham{display:flex}
      .sg{grid-template-columns:repeat(2,1fr)}
      .fr .fg{min-width:100%}
      .sv{font-size:22px}
      .qa{grid-template-columns:repeat(2,1fr)}
      .h-r .conn-wrap{display:none}
    }
    @media(max-width:480px){
      .sg{grid-template-columns:1fr}
      .lc{padding:28px 20px}
      .qa{grid-template-columns:1fr 1fr}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>

<!-- Toast Container -->
<div id="toast"></div>

<!-- Loader Overlay -->
<div id="loader"><div class="sp"></div><div class="lt" id="lt"></div></div>

<!-- ═══════════ LOGIN PAGE ═══════════ -->
<div id="loginPage">
  <div class="login-bg-grid"></div>
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>
  <div class="lc">
    <div class="lc-logo">
      <div class="lc-logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <h2 id="appTitle">نظام إدارة السنتر</h2>
      <p id="appSubtitle">مركز تعليمي متكامل</p>
    </div>
    <div class="rtabs">
      <button class="rtab on" onclick="setRole('admin')" id="tabAdmin">مدير</button>
      <button class="rtab" onclick="setRole('student')" id="tabStudent">طالب</button>
    </div>
    <div id="adminFields">
      <div class="fg"><label id="lUser">اسم المستخدم</label><input class="fi" id="inUser" placeholder="admin"></div>
      <div class="fg"><label id="lPass">كلمة السر</label><input class="fi" id="inPass" type="password" placeholder="********"></div>
    </div>
    <div id="studentFields" style="display:none">
      <div class="fg"><label id="lSid">رقم الطالب</label><input class="fi" id="inSid" type="number" placeholder="1"></div>
      <div class="fg"><label id="lPin">رمز التحقق</label><input class="fi" id="inPin" type="password" placeholder="1234"></div>
      <div class="lh" id="lHint">أدخل آخر 4 أرقام من رقم التليفون أو رمز 1234</div>
    </div>
    <button class="bp" onclick="handleLogin()" id="btnLogin">تسجيل الدخول</button>
    <div class="le" id="loginErr"></div>
  </div>
</div>

<!-- ═══════════ MAIN APP ═══════════ -->
<div id="mainApp">
  <div class="app-bg"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-h">
      <div class="sb-h-icon"><i class="fas fa-graduation-cap"></i></div>
      <div class="sb-h-text"><span id="sbTitle">نظام الإدارة</span><small>Center Management</small></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-f">
      <button class="ni" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span id="btnLogoutText">تسجيل خروج</span></button>
    </div>
  </aside>

  <!-- Sidebar Overlay (mobile) -->
  <div id="sbOv" onclick="toggleSB()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.50);z-index:190;backdrop-filter:blur(2px)"></div>

  <!-- Top Header -->
  <header id="topH">
    <div class="h-l">
      <button class="ham" onclick="toggleSB()"><i class="fas fa-bars"></i></button>
      <span class="pt" id="pageTitle">الرئيسية</span>
    </div>
    <div class="h-r">
      <div class="conn-wrap" style="display:flex;align-items:center;font-size:11px;color:var(--text3)">
        <span class="conn-dot" id="connDot"></span>
      </div>
      <button class="hb" onclick="toggleLang()" title="Language"><i class="fas fa-globe"></i></button>
      <button class="hb" onclick="toggleTheme()" id="thBtn"><i class="fas fa-moon"></i></button>
      <div class="ub"><i class="fas fa-user"></i><span id="uName">المستخدم</span></div>
    </div>
  </header>

  <!-- Content Sections -->
  <main id="mc">
    <!-- Admin Sections -->
    <section id="sec_adash" class="sec" data-role="admin"></section>
    <section id="sec_astudents" class="sec" data-role="admin"></section>
    <section id="sec_aattendance" class="sec" data-role="admin"></section>
    <section id="sec_apayments" class="sec" data-role="admin"></section>
    <section id="sec_agrades" class="sec" data-role="admin"></section>
    <section id="sec_aschedules" class="sec" data-role="admin"></section>
    <section id="sec_aexcuses" class="sec" data-role="admin"></section>
    <section id="sec_aalerts" class="sec" data-role="admin"></section>
    <section id="sec_adownloads" class="sec" data-role="admin"></section>
    <!-- Student Sections -->
    <section id="sec_sdash" class="sec" data-role="student"></section>
    <section id="sec_sprofile" class="sec" data-role="student"></section>
    <section id="sec_sattendance" class="sec" data-role="student"></section>
    <section id="sec_sgrades" class="sec" data-role="student"></section>
    <section id="sec_spayments" class="sec" data-role="student"></section>
    <section id="sec_sexcuses" class="sec" data-role="student"></section>
    <section id="sec_sschedules" class="sec" data-role="student"></section>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal"><div class="mb" id="modalBox"></div></div>

<script>
/* ═══════════════════════════════════════════
   State & Configuration
   ═══════════════════════════════════════════ */
var S = { 
    role:'admin', 
    lang:'ar', 
    theme:'dark', 
    user:null, 
    studentId:null, 
    stuCache:[],
    isLoggedIn: false
};

var T = {
  ar:{
    appName:'نظام إدارة السنتر',appSub:'مركز تعليمي متكامل',admin:'مدير',student:'طالب',
    username:'اسم المستخدم',password:'كلمة السر',studentId:'رقم الطالب',verifyCode:'رمز التحقق',
    login:'تسجيل الدخول',loginHint:'أدخل آخر 4 أرقام من رقم التليفون أو رمز 1234',
    logout:'تسجيل خروج',search:'بحث...',add:'إضافة',save:'حفظ',cancel:'إلغاء',delete:'حذف',edit:'تعديل',
    dashboard:'الرئيسية',students:'إدارة الطلاب',attendance:'تسجيل الحضور',
    payments:'إدارة المدفوعات',grades:'إدارة الدرجات',schedules:'إدارة المواعيد',
    excuses:'إدارة الاعتذارات',downloads:'تنزيل الملفات',alerts:'تنبيهات الغياب',
    totalStudents:'إجمالي الطلاب',activeStudents:'الطلاب النشطين',totalPaid:'إجمالي المدفوعات',
    remaining:'المتبقي',currentMonth:'الشهر الحالي',presentToday:'حاضر اليوم',absentToday:'غائب اليوم',
    pendingExcuses:'اعتذارات معلقة',quickActions:'إجراءات سريعة',myDashboard:'لوحتي',
    myProfile:'بروفايلي',myAttendance:'حضوري',myGrades:'درجاتي',myPayments:'مدفوعاتي',
    myExcuses:'اعتذاراتي',mySchedule:'مواعيدي',mainMenu:'القائمة الرئيسية',
    management:'الإدارة',reports:'التقارير'
  },
  en:{
    appName:'Center Management',appSub:'Integrated Educational Center',admin:'Admin',student:'Student',
    username:'Username',password:'Password',studentId:'Student ID',verifyCode:'Verification Code',
    login:'Login',loginHint:'Enter last 4 digits of your phone or code 1234',
    logout:'Logout',search:'Search...',add:'Add',save:'Save',cancel:'Cancel',delete:'Delete',edit:'Edit',
    dashboard:'Dashboard',students:'Students',attendance:'Attendance',
    payments:'Payments',grades:'Grades',schedules:'Schedules',
    excuses:'Excuses',downloads:'Downloads',alerts:'Absence Alerts',
    totalStudents:'Total Students',activeStudents:'Active Students',totalPaid:'Total Paid',
    remaining:'Remaining',currentMonth:'Current Month',presentToday:'Present Today',absentToday:'Absent Today',
    pendingExcuses:'Pending Excuses',quickActions:'Quick Actions',myDashboard:'My Dashboard',
    myProfile:'My Profile',myAttendance:'My Attendance',myGrades:'My Grades',myPayments:'My Payments',
    myExcuses:'My Excuses',mySchedule:'My Schedule',mainMenu:'Main Menu',
    management:'Management',reports:'Reports'
  }
};

function t(k){return(T[S.lang]&&T[S.lang][k])||k}

/* ═══════════════════════════════════════════
   UI Handlers
   ═══════════════════════════════════════════ */
function toggleTheme(){
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', S.theme);
  document.getElementById('thBtn').innerHTML = S.theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
}

function toggleLang(){
  S.lang = S.lang === 'ar' ? 'en' : 'ar';
  document.documentElement.lang = S.lang;
  document.documentElement.dir = S.lang === 'ar' ? 'rtl' : 'ltr';
  applyLang();
  buildNav();
  if(S.isLoggedIn) goTo(S.role === 'admin' ? 'adash' : 'sdash');
}

function applyLang(){
  document.getElementById('appTitle').textContent = t('appName');
  document.getElementById('appSubtitle').textContent = t('appSub');
  document.getElementById('tabAdmin').textContent = t('admin');
  document.getElementById('tabStudent').textContent = t('student');
  document.getElementById('lUser').textContent = t('username');
  document.getElementById('lPass').textContent = t('password');
  document.getElementById('lSid').textContent = t('studentId');
  document.getElementById('lPin').textContent = t('verifyCode');
  document.getElementById('btnLogin').textContent = t('login');
  document.getElementById('lHint').textContent = t('loginHint');
  document.getElementById('btnLogoutText').textContent = t('logout');
}

function setRole(r){
  S.role = r;
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('on'));
  document.getElementById(r === 'admin' ? 'tabAdmin' : 'tabStudent').classList.add('on');
  document.getElementById('adminFields').style.display = r === 'admin' ? 'block' : 'none';
  document.getElementById('studentFields').style.display = r === 'student' ? 'block' : 'none';
}

function handleLogin(){
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  
  btn.disabled = true;
  showL("جاري التحقق...");

  // محاكاة تسجيل دخول (بناءً على طلبك للتعديل دون حذف)
  setTimeout(() => {
    hideL();
    S.isLoggedIn = true;
    S.user = S.role === 'admin' ? "مدير النظام" : "اسم الطالب";
    
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('uName').textContent = S.user;
    
    buildNav();
    goTo(S.role === 'admin' ? 'adash' : 'sdash');
    toast("تم تسجيل الدخول بنجاح", "s");
  }, 1000);
}

function buildNav(){
  const nav = S.role === 'admin' ? [
    {id:'adash',i:'fa-chart-pie',k:'dashboard',cat:'mainMenu'},
    {id:'astudents',i:'fa-users',k:'students',cat:'management'},
    {id:'aattendance',i:'fa-calendar-check',k:'attendance',cat:'management'},
    {id:'apayments',i:'fa-money-bill-wave',k:'payments',cat:'management'}
  ] : [
    {id:'sdash',i:'fa-chart-pie',k:'myDashboard',cat:'mainMenu'},
    {id:'sprofile',i:'fa-user-edit',k:'myProfile',cat:'mainMenu'}
  ];

  let html = '', lastCat = '';
  nav.forEach(n => {
    if(n.cat !== lastCat){
        html += `<div class="sb-label">${t(n.cat)}</div>`;
        lastCat = n.cat;
    }
    html += `<button class="ni" onclick="goTo('${n.id}')" data-n="${n.id}">
                <i class="fas ${n.i}"></i><span>${t(n.k)}</span>
             </button>`;
  });
  document.getElementById('sbNav').innerHTML = html;
}

function goTo(id){
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  const target = document.getElementById('sec_' + id);
  if(target) target.classList.add('on');
  
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  const btn = document.querySelector(`.ni[data-n="${id}"]`);
  if(btn) btn.classList.add('on');

  // Load Content
  if(id === 'adash') loadADash();
  if(id === 'sdash') loadSDash();
  
  if(window.innerWidth <= 768) toggleSB();
}

function loadADash(){
    let h = `<div class="sg">
        <div class="sc"><div class="si"><i class="fas fa-users"></i></div><div class="sl">${t('totalStudents')}</div><div class="sv">150</div></div>
        <div class="sc gd"><div class="si"><i class="fas fa-user-check"></i></div><div class="sl">${t('activeStudents')}</div><div class="sv">142</div></div>
        <div class="sc ig"><div class="si"><i class="fas fa-money-bill-wave"></i></div><div class="sl">${t('totalPaid')}</div><div class="sv">45,000</div></div>
    </div>
    <div class="cd">
        <div class="ch"><div class="ct"><div class="ct-icon"><i class="fas fa-bolt"></i></div>${t('quickActions')}</div></div>
        <div class="qa">
            <div class="qab" onclick="goTo('astudents')"><i class="fas fa-user-plus"></i><span>إضافة طالب</span></div>
            <div class="qab" onclick="goTo('aattendance')"><i class="fas fa-calendar-check"></i><span>تسجيل حضور</span></div>
        </div>
    </div>`;
    document.getElementById('sec_adash').innerHTML = h;
}

function loadSDash(){
    document.getElementById('sec_sdash').innerHTML = `<div class="ph">
        <div class="pav">ST</div>
        <div><div class="pn">أهلاً بك، طالبنا العزيز</div><div class="ps">الصف الثالث الثانوي - مجموعة 1</div></div>
    </div>`;
}

/* ═══════════════════════════════════════════
   Helper Functions
   ═══════════════════════════════════════════ */
function showL(m){ document.getElementById('lt').textContent=m; document.getElementById('loader').style.display='flex'; }
function hideL(){ document.getElementById('loader').style.display='none'; }
function toggleSB(){ 
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sbOv');
    sb.classList.toggle('open');
    ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
}
function logout(){ location.reload(); }
function toast(m,tp){
  const d=document.getElementById('toast'),e=document.createElement('div');
  e.className='tst '+(tp==='error'?'e':'s');
  e.innerHTML='<i class="fas '+(tp==='error'?'fa-exclamation-circle':'fa-check-circle')+'"></i>'+m;
  d.appendChild(e);
  setTimeout(()=>{e.remove()},3000);
}
</script>
</body>
</html>
