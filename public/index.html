  h += sC('fa-percentage', (d.attRate || 0) + '%', t('attRate'), '');
  h += sC('fa-check-circle', d.present || 0, t('present'), 'gd');
  h += sC('fa-times-circle', d.absent || 0, t('absent'), 'dg');
  h += sC('fa-clock', d.late || 0, t('late'), 'wg');
  h += sC('fa-star', d.avgGrade || '-', t('avg'), 'ig');
  h += sC('fa-award', d.gradeLabel || '-', t('rate'), 'gd');
  h += sC('fa-money-bill-wave', d.unpaidCount || 0, t('unpaid'), 'dg');
  h += sC('fa-calendar', d.month, t('curMonth'), 'wg');
  h += '</div><div class="cd2"><div class="ch"><div class="ct"><div class="ci"><i class="fas fa-bolt"></i></i></div>' + t('qa') + '</div><div class="qa">';
  h += '<button class="qab" onclick="goTo(\'sattendance\')"><i class="fas fa-calendar-check"></i><span>' + t('markP') + '</span></button>';
  h += '<button class="qab" onclick="goTo(\'sexc\')"><i class="fas fa-envelope-open-text"></i><span>' + t('subExc') + '</span></button>';
  h += '<button class="qab" onclick="goTo(\'sgrades\')"><i class="fas fa-star"></i><span>' + t('myGr') + '</span></button>';
  h += '<button class="qab" onclick="goTo(\'spay\')"><i class="fas fa-money-bill-wave"></i><span>' + t('myPy') + '</span></button>';
  h += '<button class="qab" onclick="goTo(\'ssk\')"><i class="fas fa-clock"></i><span>' + t('mySch') + '</span></button>';
  h += '</div></div>';
  document.getElementById('s_sdash').innerHTML = h;
}

async function ldSPro() {
  var p = await api('student/profile', { id: S.sid });
  if (!p) { document.getElementById('s_spro').innerHTML = eS('fa-user', t('noData')); return; }
  var h = '<div class="ph"><div class="pav">' + (p.name || '?')[0] + '</div><div class="ps">ID: ' + sv(p.id) + ' | ' + sv(p.grade) + ' | ' + sv(p.group) + '</div>';
  h += '<div class="cd2"><div class="ch"><div class="ct"><div class="ci"><i class="fas fa-user-edit"></i></i></i></div>' + t('editPro') + '</div></div>';
  h += '<div class="fr"><div class="fg"><label>' + t('phone') + '</label><input class="fi" id="prPh" value="' + sv(p.studentPhone) + '"></div><div class="fg"><label>WhatsApp</label><input class="fi" id="prWa" value="' + sv(p.whatsapp) + '"></div><div class="fg"><label>' + t('phone2') + '</label><input class="fi" id="prP2" value="' + sv(p.phone2) + '"></div></div></div>';
  h += '<button class="btn ba" onclick="svPr()"><i class="fas fa-save"></i>' + t('save') + '</button></button></div>';
  h += '<div class="cd2"><div class="fr"><div class="fg"><label>' + t('grade') + '</label><input class="fi" value="' + sv(p.grade) + '" readonly></div><div class="fg"><label>' + t('subject') + '</label><input class="fi" value="' + sv(p.subject) + '" readonly></div><div class="fg"><label>' + t('sub') + '</label><input class="fi" value="' + sv(p.subscription) + '" readonly></div><div class="fg"><label>' + t('parent') + '</label><input class="fi" value="' + sv(p.parentName) + '" readonly></div><div class="fg"><label>' + t('status') + '</label><input class="fi" value="' + sv(p.status) + '" readonly></div></div></div></div>';
  document.getElementById('s_spro').innerHTML = h;
}

async function svPr() {
  await api('student/profile/update', { studentId: S.sid, whatsapp: gV('prWa'), studentPhone: gV('prPh'), phone2: gV('prP2') });
  toast(t('proOk'), 's');
}

async function ldSAtt() {
  var d = await api('student/attendance', { id: S.sid });
  if (!d) { document.getElementById('s_satt').innerHTML = eS('fa-calendar', t('noData')); return; }
  var today = new Date().getDate(), tv = d.days ? d.days[today - 1] || '';
  var h = '<div class="cd2"><div class="ch"><div class="ct"><div class="ci"><i class="fas fa-calendar-check"></i></i></i></div><span>' + t('myAtt') + ' — ' + sv(d.month) + '</span>';
  if (!tv) {
    h += '<div class="bgrp"><button class="btn ba" onclick="mKA(\'ح\')"><i class="fas fa-check"></i></i>' + t('markP') + '</button><button class="btn bd" onclick="mKA(\'غ\')"><i class="fas fa-times"></i></i></button></div>';
  } else {
    var bc = tv === 'ح' ? 'bg-g' : tv === 'غ' ? 'bg-r' : 'bg-w';
    h += '<span class="bg ' + bc + '">' + (tv === 'ح' ? t('present') : tv === 'غ' ? t('absent') : tv === 'ت' ? t('late') : '-') + '</span></div>';
  }
  h += '</div><div class="ag">';
  var pr = 0, ab = 0, lt = 0;
  if (d.days) d.days.forEach(function (v) { if (v === 'ح') pr++; else if (v === 'غ') ab++; else if (v === 'ت') lt++; });
  var tot = pr + ab + lt;
  h += sC('fa-percentage', (tot ? ((pr / tot) * 100).toFixed(0) : 0) + '%', t('attRate'), '');
  h += sC('fa-check-circle', pr, t('present'), 'gd');
  h += sC('fa-times-circle', ab, t('absent'), 'dg');
  h += sC('fa-clock', lt, t('late'), 'wg');
  h += '</div>';
  document.getElementById('s_satt').innerHTML = h;
}

async function mKA(st) {
  await api('student/attendance/mark', { studentId: S.sid, status: st });
  toast(st === 'ح' ? t('markP') : t('markA'), 's');
  ldSAtt();
}

async function ldSGr() {
  var list = await api('student/grades', { id: S.sid });
  var el = document.getElementById('s_sgr');
  if (!list || !list.length) { el.innerHTML = eS('fa-star', t('noGr')); return; }
  var g = list[0];
  var h = '<div class="ph"><div class="pav"><i class="fas fa-star"></i></i></div><div><div><div class="pn">' + sv(g.name) + '</div><div class="ps">' + t('avg') + ': ' + sv(g.grade) + ' | ' + t('rate') + '</div></div></div>';
  h += '<div class="cd2"><div class="tw"><table><thead><tr><th>ID</th><th>' + t('name') + '</th>';
  for (var i = 1; i <= 4; i++) h += '<th>' + t('exam') + ' ' + i + '</th>';
  for (var i = 1; i <= 3; i++) h += '<th>' + t('hw') + ' ' + i + '</th>';
  h += '<th>' + t('avg') + '</th><th>' + t('rate') + '</th><th>' + t('notes') + '<th></th></tr></thead><tbody id="gTB"></tbody></table></div></div></div>';
  el.innerHTML = h;
}

async function ldSPy() {
  var list = await api('student/payments', { name: S.user });
  var el = document.getElementById('s_spy');
  if (!list || !list.length) { el.innerHTML = eS('fa-money-bill-wave', t('noPy')); return; }
  var h = '<div class="cd2"><div class="tw"><table><thead><tr><th>' + t('month') + '/' + t('year') + '</th><th>' + t('sub') + '</th><th>' + t('paid') + '</th><th>' + t('remain') + '</th></tr></thead><tbody>';
  list.forEach(function (p) {
    var bg = p.status && p.status.includes('مكتمل') ? bG(t('paidOk'), 'bg-g') : bG(t('paidNo'), 'bg-w');
    h += '<tr><td>' + sv(p.monthYear) + '</td><td>' + sv(p.subscription) + '</td>' + sv(p.paid) + '</td>' + sv(p.remaining) + '</td>' + bg + '</td></tr>';
  });
  el.innerHTML = h;
}

async function ldSExc() {
  var h = '<div class="cd2"><div class="ch"><div class="ct"><div class="ci"><i class="fas fa-envelope-open-text"></i></i></i></div><span>' + t('subExc') + '</span></div></div>';
  h += '<div class="fg"><label>' + t('reason') + '</label><textarea class="fi" id="exR" rows="3" placeholder="' + t('entReason') + '" style="resize:vertical;min-height:80px"></textarea></div>';
  h += '<button class="btn ba" onclick="sbEx()"><i class="fas fa-paper-plane"></i>' + t('subExc') + '</button></div><div id="exL"></div></div>';
  document.getElementById('s_sex').innerHTML = h;
  var list = await api('student/excuses', { id: S.sid });
  var el = document.getElementById('exL');
  if (!el) return;
  if (!list || !list.length) { el.innerHTML = eS('fa-envelope-open-text', t('noExc')); return; }
  var out = '<div class="cd2">';
  list.forEach(function (e) {
    var bg = e.status && e.status.includes('قيد') ? bG(t('pending'), 'bg-w') : e.status && e.status.includes('مقبول') ? bG(t('approved'), 'bg-g') : bG(t('rejected'), 'bg-r');
    out += '<div style="padding:14px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="display:flex;justify-content:space-between"><strong>' + sv(e.date) + '</strong>' + bg + '</div><div style="display:flex;justify-content:space-between"><strong>' + (e.reply && e.reply !== '' ? '<div style="color:var(--accent);font-size:12px;margin-top:6px"><strong>' + t('reply') + ': </strong></div>' : '') + '</div></div></div></div>';
  });
  el.innerHTML = out + '</div>';
}

async function sbEx() {
  var reason = gV('exR');
  if (!reason) { toast(t('entReason'), 'e'); return; }
  await api('student/excuses/add', { studentId: S.sid, studentName: S.user, reason });
  toast(t('excOk'), 's'); ldSExc();
}

async function ldSSk() {
  var list = await api('student/schedules');
  var el = document.getElementById('s_ssk');
  if (!list || !list.length) { el.innerHTML = eS('fa-clock', t('noSch')); return; }
  el.innerHTML = list.map(function (s) {
    return '<div class="skc"><div class="skd">' + sv(s.day) + '</div><div class="ski"><span><i class="fas fa-clock"></i>' + sv(s.time) + '</span><span><i class="fas fa-users"></i>' + sv(s.group) + '</span><span><i class="fas fa-book"></i>' + sv(s.subject) + '</span><span><i class="fas fa-chalkboard-teacher"></i>' + sv(s.teacher) + '</span></div></div></div>';
});
}

document.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') doLogin();
});
document.getElementById('modal').addEventListener('click', function (e) { if (e.target === this) cM(); });
</script>
