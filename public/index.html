<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070b12">
  <title>نظام إدارة السنتر التعليمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #070b12; --bg2: #0c1220; --card: #0f1825; --border: #1c2d48; --border2: #243652;
      --text: #e4e9f2; --text2: #6b7a94; --text3: #4a5a74;
      --accent: #00d4aa; --accent2: #00b894; --accent3: #009e7e;
      --accent-g: rgba(0, 212, 170, 0.1); --accent-g2: rgba(0, 212, 170, 0.18);
      --gold: #f5c542; --gold-g: rgba(245, 197, 66, 0.1);
      --danger: #ff5757; --danger-g: rgba(255, 87, 87, 0.1);
      --warn: #ffb347; --warn-g: rgba(255, 179, 71, 0.1);
      --info: #4ecdc4; --info-g: rgba(78, 205, 196, 0.1);
      --r: 14px; --r3: 8px; --sh: 0 4px 30px rgba(0, 0, 0, 0.4);
      --sb: 260px; --hd: 60px;
    }
    [data-theme="light"] {
      --bg: #f0f2f5; --bg2: #e4e8ee; --card: #ffffff; --border: #d0d7e2; --border2: #bcc5d3;
      --text: #141a24; --text2: #5a6578; --text3: #8a94a6;
      --accent: #00b894; --accent2: #009e7e; --accent-g: rgba(0, 184, 148, 0.07);
      --gold: #e5a800; --danger: #e04040; --warn: #e69500; --info: #00b8a9;
      --sh: 0 2px 16px rgba(0, 0, 0, 0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* Login Page */
    #loginPage { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: linear-gradient(135deg, #050810 0%, #0a1020 50%, #070b12 100%); }
    [data-theme="light"] #loginPage { background: linear-gradient(135deg, #e8f5f0 0%, #f0f2f5 50%, #f5f0e5 100%); }
    .login-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 25s linear infinite; }
    @keyframes gridMove { to { transform: translate(50px, 50px); } }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: orbFloat 15s ease-in-out infinite; }
    .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0, 212, 170, 0.15), transparent 70%); top: -100px; right: -50px; }
    .orb2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(245, 197, 66, 0.1), transparent 70%); bottom: -80px; left: -60px; animation-delay: -7s; }
    @keyframes orbFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -20px) scale(1.05); } }

    .login-container { background: rgba(15, 24, 37, 0.85); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; width: 400px; max-width: 90vw; position: relative; z-index: 2; box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5); animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    [data-theme="light"] .login-container { background: rgba(255, 255, 255, 0.9); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-icon { width: 60px; height: 60px; margin: 0 auto 12px; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent3)); display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; box-shadow: 0 6px 20px rgba(0, 212, 170, 0.3); }
    .login-logo h2 { font-size: 18px; font-weight: 800; }
    .login-logo p { font-size: 11px; color: var(--text2); margin-top: 4px; }

    .role-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg2); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
    .role-tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.25s; color: var(--text2); border: none; background: none; font-family: inherit; }
    .role-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 12px rgba(0, 212, 170, 0.3); }
    .role-tab:hover:not(.active) { color: var(--text); background: var(--accent-g); }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 600; color: var(--text2); }
    .form-input { width: 100%; padding: 11px 14px; border-radius: var(--r3); border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 14px; font-family: inherit; transition: 0.2s; outline: none; }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-g); }
    .form-input::placeholder { color: var(--text3); }

    .btn-primary { width: 100%; padding: 12px; border: none; border-radius: var(--r3); background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: 0.25s; margin-top: 8px; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0, 212, 170, 0.35); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .login-error { color: var(--danger); font-size: 12px; text-align: center; margin-top: 10px; display: none; font-weight: 600; }
    .login-hint { color: var(--text3); font-size: 11px; text-align: center; margin-top: 14px; line-height: 1.6; }

    /* Main App */
    #mainApp { display: none; min-height: 100vh; }
    .app-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .app-bg::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 212, 170, 0.04), transparent 70%); top: -200px; right: -100px; border-radius: 50%; }

    /* Sidebar */
    #sidebar { position: fixed; top: 0; right: 0; width: var(--sb); height: 100vh; background: var(--card); border-left: 1px solid var(--border); z-index: 200; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    [dir="ltr"] #sidebar { right: auto; left: 0; border-left: none; border-right: 1px solid var(--border); }
    .sidebar-header { padding: 18px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .sidebar-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent3)); display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; flex-shrink: 0; }
    .sidebar-title { flex: 1; overflow: hidden; }
    .sidebar-title span { font-weight: 700; font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-title small { font-size: 10px; color: var(--text2); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 6px; }
    .nav-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 12px 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--r3); cursor: pointer; transition: 0.2s; color: var(--text2); font-size: 13px; font-weight: 500; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: inherit; font-family: inherit; position: relative; }
    .nav-item:hover { background: var(--accent-g); color: var(--text); }
    .nav-item.active { background: var(--accent-g2); color: var(--accent); font-weight: 700; }
    .nav-item.active::before { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 18px; background: var(--accent); border-radius: 0 3px 3px 0; }
    [dir="ltr"] .nav-item.active::before { right: auto; left: 0; border-radius: 3px 0 0 3px; }
    .nav-item i { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }
    .sidebar-footer { padding: 8px 6px; border-top: 1px solid var(--border); }
    .sidebar-footer .nav-item { color: var(--danger); }
    .sidebar-footer .nav-item:hover { background: var(--danger-g); }
    .sidebar-footer .nav-item i { color: var(--danger); }

    /* Top Header */
    #topHeader { position: fixed; top: 0; right: var(--sb); left: 0; height: var(--hd); background: rgba(15, 24, 37, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; transition: right 0.3s, left 0.3s; }
    [data-theme="light"] #topHeader { background: rgba(255, 255, 255, 0.85); }
    [dir="ltr"] #topHeader { right: 0; left: var(--sb); }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--text); font-size: 16px; cursor: pointer; padding: 6px 8px; border-radius: var(--r3); transition: 0.2s; }
    .hamburger:hover { border-color: var(--accent); color: var(--accent); }
    .page-title { font-weight: 700; font-size: 15px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .header-btn { width: 36px; height: 36px; border-radius: var(--r3); border: 1px solid var(--border); background: var(--card); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 13px; }
    .header-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-g); }
    .user-badge { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--accent-g); border: 1px solid rgba(0, 212, 170, 0.2); border-radius: var(--r3); font-size: 12px; font-weight: 600; color: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulse 2s infinite; }
    .status-dot.offline { background: var(--danger); animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Main Content */
    #mainContent { margin-top: var(--hd); margin-inline-start: var(--sb); padding: 20px; min-height: calc(100vh - var(--hd)); transition: margin 0.3s; position: relative; z-index: 1; }
    .section { display: none; animation: fadeIn 0.3s ease-out; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Toast */
    #toast { position: fixed; top: 72px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast-item { padding: 12px 20px; border-radius: var(--r3); font-size: 13px; font-weight: 600; min-width: 260px; text-align: center; box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4); animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .toast-item.success { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .toast-item.error { background: linear-gradient(135deg, var(--danger), #cc3b3b); color: #fff; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-16px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* Loader */
    #loader { position: fixed; inset: 0; background: rgba(7, 11, 18, 0.85); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 9998; flex-direction: column; gap: 14px; }
    [data-theme="light"] #loader { background: rgba(240, 242, 245, 0.85); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: var(--text2); font-size: 13px; font-weight: 500; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; transition: 0.25s; position: relative; overflow: hidden; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--sh); border-color: var(--border2); }
    .stat-card::before { content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 3px; background: var(--accent); }
    .stat-card.gold::before { background: var(--gold); }
    .stat-card.danger::before { background: var(--danger); }
    .stat-card.info::before { background: var(--info); }
    .stat-card.warn::before { background: var(--warn); }
    .stat-icon { font-size: 16px; color: var(--accent); margin-bottom: 10px; position: relative; z-index: 1; }
    .stat-card.gold .stat-icon { color: var(--gold); }
    .stat-card.danger .stat-icon { color: var(--danger); }
    .stat-card.info .stat-icon { color: var(--info); }
    .stat-card.warn .stat-icon { color: var(--warn); }
    .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 600; position: relative; z-index: 1; }
    .stat-value { font-size: 26px; font-weight: 900; position: relative; z-index: 1; letter-spacing: -0.5px; }

    /* Card */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 16px; transition: 0.25s; }
    .card:hover { border-color: var(--border2); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .card-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .card-title i { color: var(--accent); font-size: 14px; }
    .card-icon { width: 30px; height: 30px; border-radius: var(--r3); background: var(--accent-g); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon i { color: var(--accent); font-size: 12px; }

    /* Form Row */
    .form-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .form-row .form-group { flex: 1; min-width: 150px; }

    /* Buttons */
    .btn { padding: 8px 16px; border-radius: var(--r3); border: none; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
    .btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-accent:hover { box-shadow: 0 4px 14px rgba(0, 212, 170, 0.3); transform: translateY(-1px); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-g); }
    .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Table */
    .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead { background: var(--bg2); }
    th { padding: 10px 12px; text-align: center; font-weight: 700; color: var(--text2); font-size: 11px; white-space: nowrap; border-bottom: 1px solid var(--border); }
    td { padding: 9px 12px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { transition: 0.15s; }
    tbody tr:hover { background: var(--accent-g); }
    tbody tr:last-child td { border-bottom: none; }

    /* Badge */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }
    .badge-success { background: var(--accent-g); color: var(--accent); }
    .badge-danger { background: var(--danger-g); color: var(--danger); }
    .badge-warn { background: var(--warn-g); color: var(--warn); }
    .badge-info { background: var(--info-g); color: var(--info); }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal.show { display: flex; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5); animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.94) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .modal-title i { color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
    .modal-desc { color: var(--text2); font-size: 13px; line-height: 1.7; margin: 14px 0; }

    /* Empty State */
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text2); }
    .empty-state i { font-size: 48px; margin-bottom: 14px; opacity: 0.2; display: block; }
    .empty-state p { font-size: 13px; font-weight: 500; }

    /* Sidebar Overlay */
    #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 190; }

    /* Quick Actions */
    .quick-actions { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .quick-action-btn { padding: 16px 12px; border-radius: var(--r); border: 1px solid var(--border); background: var(--card); cursor: pointer; transition: 0.25s; text-align: center; font-family: inherit; color: var(--text); }
    .quick-action-btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--sh); background: var(--accent-g); }
    .quick-action-btn i { font-size: 22px; color: var(--accent); display: block; margin-bottom: 8px; }
    .quick-action-btn span { font-size: 11px; font-weight: 600; }

    /* Responsive */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(100%); }
      #sidebar.open { transform: translateX(0); }
      [dir="ltr"] #sidebar { transform: translateX(-100%); }
      [dir="ltr"] #sidebar.open { transform: translateX(0); }
      #topHeader { right: 0 !important; left: 0 !important; }
      #mainContent { margin-inline-start: 0 !important; padding: 14px; }
      .hamburger { display: flex; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row .form-group { min-width: 100%; }
      .stat-value { font-size: 22px; }
      .quick-actions { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .login-container { padding: 24px 18px; }
      .quick-actions { grid-template-columns: 1fr 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div id="toast"></div>
<div id="loader"><div class="spinner"></div><div class="loader-text" id="loaderText">جاري التحميل...</div></div>

<!-- Login Page -->
<div id="loginPage">
  <div class="login-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="login-container">
    <div class="login-logo">
      <div class="login-icon"><i class="fas fa-graduation-cap"></i></div>
      <h2 id="appTitle">نظام إدارة السنتر</h2>
      <p id="appSub">مركز تعليمي متكامل</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin')" id="tabAdmin">مدير</button>
      <button class="role-tab" onclick="setRole('student')" id="tabStudent">طالب</button>
    </div>
    <div id="adminFields">
      <div class="form-group"><label id="labelUsername">اسم المستخدم</label><input class="form-input" id="inputUser" placeholder="admin"></div>
      <div class="form-group"><label id="labelPassword">كلمة السر</label><input class="form-input" id="inputPass" type="password" placeholder="********"></div>
    </div>
    <div id="studentFields" style="display:none">
      <div class="form-group"><label id="labelStudentId">رقم الطالب</label><input class="form-input" id="inputStudentId" type="number" placeholder="1"></div>
      <div class="form-group"><label id="labelCode">رمز التحقق</label><input class="form-input" id="inputCode" type="password" placeholder="1234"></div>
      <div class="login-hint" id="loginHint">آخر 4 أرقام واتساب أو 1234</div>
    </div>
    <button class="btn-primary" onclick="doLogin()" id="btnLogin">تسجيل الدخول</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp">
  <div class="app-bg"></div>
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-icon"><i class="fas fa-graduation-cap"></i></div>
      <div class="sidebar-title"><span id="sidebarTitle">نظام الإدارة</span><small>Center Management</small></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">

async function api(action, data, method) { showLoader(); let url = '/api/' + action; const opts = { headers: { 'Content-Type': 'application/json' } }; if (method === 'GET' || (!method && !WRITE_ACTIONS.includes(action))) { if (data) url += '?' + new URLSearchParams(data).toString(); opts.method = 'GET'; } else { opts.method = method || 'POST'; opts.body = JSON.stringify(data || {}); } try { const res = await fetch(url, opts); const dot = document.getElementById('statusDot'); if (dot) dot.classList.remove('offline'); const json = await res.json(); hideLoader(); if (json.success === false) { showToast(json.message || 'Error', 'error'); return null; } return json.data !== undefined ? json.data : json; } catch (err) { hideLoader(); const dot = document.getElementById('statusDot'); if (dot) dot.classList.add('offline'); showToast('Connection error', 'error'); console.error(err); return null; } }

async function doLogin() { const btn = document.getElementById('btnLogin'); btn.disabled = true; let payload; if (loginRole === 'admin') { const user = getVal('inputUser'); const pass = getVal('inputPass'); if (!user || !pass) { showError(t('username') + ' / ' + t('password')); btn.disabled = false; return; } payload = { role: 'admin', user, pass }; } else { const sid = getVal('inputStudentId'); const code = getVal('inputCode'); if (!sid || !code) { showError(t('studentId') + ' / ' + t('code')); btn.disabled = false; return; } payload = { role: 'student', user: sid, pass: code }; } const result = await api('verifyLogin', payload); btn.disabled = false; if (result) { STATE.role = result.role; STATE.user = result.name || ''; STATE.studentId = result.studentId || null; document.getElementById('loginPage').style.display = 'none'; document.getElementById('mainApp').style.display = 'block'; document.getElementById('userName').textContent = STATE.user; if (STATE.role === 'admin') await api('setup'); buildNav(); navigateTo(STATE.role === 'admin' ? 'adminDashboard' : 'studentDashboard'); } }

async function loadAdminStudents() { const list = await api('students'); STATE.studentsCache = list || []; let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-user-plus"></i></div>${t('addStudent')}</div></div>`; html += '<div class="form-row">'; html += `<div class="form-group"><label>${t('name')}</label><input class="form-input" id="stuName"></div>`; html += `<div class="form-group"><label>${t('grade')}</label><select class="form-input" id="stuGrade">${buildOptions(GRADES)}</select></div>`; html += `<div class="form-group"><label>${t('subject')}</label><input class="form-input" id="stuSubject" value="كيمياء"></div>`; html += '</div><div class="form-row">'; html += `<div class="form-group"><label>${t('parent')}</label><input class="form-input" id="stuParent"></div>`; html += `<div class="form-group"><label>WA</label><input class="form-input" id="stuWhatsapp" maxlength="11"></div>`; html += `<div class="form-group"><label>${t('phone')}</label><input class="form-input" id="stuPhone"></div>`; html += '</div><div class="form-row">'; html += `<div class="form-group"><label>${t('group')}</label><select class="form-input" id="stuGroup">${buildOptions(GROUPS)}</select></div>`; html += `<div class="form-group"><label>${t('subscription')}</label><select class="form-input" id="stuSub">${buildOptions(['300','350','400','500'])}</select></div>`; html += `<div class="form-group"><label>${t('status')}</label><select class="form-input" id="stuStatus"><option value="✅ نشط">${t('active')}</option><option value="⚠️ غير نشط">${t('inactive')}</option></select></div>`; html += '</div>'; html += `<button class="btn btn-accent" onclick="addStudent()"><i class="fas fa-plus"></i>${t('add')}</button></div>`; html += `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-users"></i></div>${t('studentList')} (${STATE.studentsCache.length})</div>`; html += `<input class="form-input" style="max-width:200px" placeholder="${t('search')}" oninput="filterStudents(this.value)"></div>`; html += '<div class="table-wrapper"><table><thead><tr>'; html += `<th>ID</th><th>${t('name')}</th><th>${t('grade')}</th><th>${t('group')}</th><th>${t('subscription')}</th><th>WA</th><th>${t('status')}</th><th></th></tr></thead><tbody id="studentsTableBody"></tbody></table></div></div>`; document.getElementById('sec_adminStudents').innerHTML = html; renderStudentsTable(STATE.studentsCache); }
function renderStudentsTable(list) { const tb = document.getElementById('studentsTableBody'); if (!tb) return; if (!list.length) { tb.innerHTML = `<tr><td colspan="8">${emptyState('fa-users', t('noData'))}</td></tr>`; return; } tb.innerHTML = list.map(s => { const statusBadge = s.status && s.status.includes('نشط') ? badge(t('active'), 'badge-success') : badge(t('inactive'), 'badge-danger'); return `<tr><td>${safeVal(s.id)}</td><td style="font-weight:600">${safeVal(s.name)}</td><td>${safeVal(s.grade)}</td><td>${safeVal(s.group)}</td><td>${safeVal(s.subscription)}</td><td>${s.whatsapp ? `<a href="https://wa.me/+20${s.whatsapp}" target="_blank" style="font-size:11px">${safeVal(s.whatsapp)}</a>` : '-'}</td><td>${statusBadge}</td><td><div class="btn-group"><button class="btn btn-sm btn-outline" onclick="editStudent(${s.id})"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteStudent(${s.id})"><i class="fas fa-trash"></i></button></div></td></tr>`; }).join(''); }
function filterStudents(query) { const q = query.toLowerCase(); renderStudentsTable(STATE.studentsCache.filter(s => { return (safeVal(s.name) + ' ' + safeVal(s.id) + ' ' + safeVal(s.studentPhone)).toLowerCase().includes(q); })); }
async function addStudent() { const name = getVal('stuName'); if (!name) { showToast(t('name') + '!', 'error'); return; } await api('students/add', { name, grade: getVal('stuGrade'), subject: getVal('stuSubject'), parentName: getVal('stuParent'), whatsapp: getVal('stuWhatsapp'), studentPhone: getVal('stuPhone'), group: getVal('stuGroup'), subscription: +getVal('stuSub'), status: getVal('stuStatus') }); showToast(t('add'), 'success'); loadAdminStudents(); }
async function editStudent(id) { const s = STATE.studentsCache.find(x => x.id == id); if (!s) return; let html = `<div class="modal-title"><i class="fas fa-user-edit"></i>${t('edit')}</div>`; html += '<div class="form-row">'; html += `<div class="form-group"><label>${t('name')}</label><input class="form-input" id="editName" value="${safeVal(s.name)}"></div>`; html += `<div class="form-group"><label>${t('grade')}</label><select class="form-input" id="editGrade">${buildOptions(GRADES, safeVal(s.grade))}</select></div>`; html += '</div><div class="form-row">'; html += `<div class="form-group"><label>WA</label><input class="form-input" id="editWhatsapp" value="${safeVal(s.whatsapp)}"></div>`; html += `<div class="form-group"><label>${t('phone')}</label><input class="form-input" id="editPhone" value="${safeVal(s.studentPhone)}"></div>`; html += '</div><div class="form-row">'; html += `<div class="form-group"><label>${t('group')}</label><select class="form-input" id="editGroup">${buildOptions(GROUPS, safeVal(s.group))}</select></div>`; html += `<div class="form-group"><label>${t('subscription')}</label><input class="form-input" id="editSub" type="number" value="${safeVal(s.subscription)}"></div>`; html += `<div class="form-group"><label>${t('status')}</label><select class="form-input" id="editStatus"><option value="✅ نشط"${s.status && s.status.includes('نشط') ? ' selected' : ''}>${t('active')}</option><option value="⚠️ غير نشط"${s.status && s.status.includes('غير') ? ' selected' : ''}>${t('inactive')}</option></select></div>`; html += '</div>'; html += `<div class="modal-actions"><button class="btn btn-accent" onclick="saveStudent(${id})"><i class="fas fa-save"></i>${t('save')}</button><button class="btn btn-outline" onclick="closeModal()">${t('cancel')}</button></div>`; showModal(html); }
async function saveStudent(id) { await api('students/update', { id, name: getVal('editName'), grade: getVal('editGrade'), whatsapp: getVal('editWhatsapp'), studentPhone: getVal('editPhone'), group: getVal('editGroup'), subscription: +getVal('editSub'), status: getVal('editStatus') }); closeModal(); showToast(t('save'), 'success'); loadAdminStudents(); }
async function deleteStudent(id) { if (await confirmDialog(t('confirmDelete'))) { await api('students/delete', { id }); showToast(t('delete'), 'success'); loadAdminStudents(); } }

async function loadAdminPayments() { const list = await api('payments'); let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-money-bill-wave"></i></div>${t('payments')}</div></div>`; html += '<div class="table-wrapper"><table><thead><tr>'; html += `<th>${t('name')}</th><th>${t('group')}</th><th>${t('month')}/${t('year')}</th><th>${t('subscription')}</th><th>${t('paid')}</th><th>${t('remaining')}</th><th></th></tr></thead><tbody id="paymentsTableBody"></tbody></table></div></div>`; document.getElementById('sec_adminPayments').innerHTML = html; const tb = document.getElementById('paymentsTableBody'); if (!tb) return; if (!list || !list.length) { tb.innerHTML = `<tr><td colspan="7">${emptyState('fa-money-bill-wave', t('noData'))}</td></tr>`; return; } tb.innerHTML = list.map(p => { const statusBadge = p.status && p.status.includes('مكتمل') ? badge(t('complete'), 'badge-success') : badge(t('incomplete'), 'badge-warn'); return `<tr><td>${safeVal(p.name)}</td><td>${safeVal(p.group)}</td><td>${safeVal(p.monthYear)}</td><td>${safeVal(p.subscription)}</td><td>${safeVal(p.paid)}</td><td>${safeVal(p.remaining)}</td><td>${statusBadge}</td></tr>`; }).join(''); }

async function loadAdminGrades() { const list = await api('grades'); let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-star"></i></div>${t('grades')}</div></div>`; html += '<div class="table-wrapper"><table><thead><tr>'; html += `<th>ID</th><th>${t('name')}</th>`; for (let i = 1; i <= 4; i++) html += `<th>${t('exam')} ${i}</th>`; for (let i = 1; i <= 3; i++) html += `<th>${t('homework')} ${i}</th>`; html += `<th>${t('average')}</th><th>${t('rating')}</th><th></th></tr></thead><tbody id="gradesTableBody"></tbody></table></div></div>`; document.getElementById('sec_adminGrades').innerHTML = html; const tb = document.getElementById('gradesTableBody'); if (!tb) return; if (!list || !list.length) { tb.innerHTML = `<tr><td colspan="13">${emptyState('fa-star', t('noGrades'))}</td></tr>`; return; } tb.innerHTML = list.map((g, i) => { let row = `<tr><td>${safeVal(g.id)}</td><td>${safeVal(g.name)}</td>`; ['exam1', 'exam2', 'exam3', 'exam4', 'hw1', 'hw2', 'hw3'].forEach((k, j) => { row += `<td><input class="form-input" style="width:50px;padding:4px" value="${safeVal(g[k])}" id="grade_${i}_${j}" onchange="calcAvg(${i})"></td>`; }); row += `<td id="gradeAvg_${i}" style="font-weight:800;color:var(--accent)">${safeVal(g.avg)}</td>`; row += `<td><input class="form-input" style="width:60px;padding:4px" value="${safeVal(g.grade)}" id="gradeRating_${i}"></td>`; row += `<td><button class="btn btn-sm btn-accent" onclick="saveGrade(${i}, '${g.id}')"><i class="fas fa-save"></i></button></td></tr>`; return row; }).join(''); }
function calcAvg(i) { const vals = []; for (let j = 0; j < 7; j++) { const v = document.getElementById(`grade_${i}_${j}`).value; if (v !== '' && !isNaN(v)) vals.push(+v); } const el = document.getElementById(`gradeAvg_${i}`); const avg = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : ''; el.textContent = avg; el.style.color = vals.length && (vals.reduce((a, b) => a + b, 0) / vals.length) >= 50 ? 'var(--accent)' : 'var(--danger)'; }
async function saveGrade(i, id) { const row = document.querySelectorAll('#gradesTableBody tr')[i]; if (!row) return; const data = { id }; ['exam1', 'exam2', 'exam3', 'exam4', 'hw1', 'hw2', 'hw3'].forEach((k, j) => { data[k] = document.getElementById(`grade_${i}_${j}`).value; }); data.avg = document.getElementById(`gradeAvg_${i}`).textContent; data.grade = document.getElementById(`gradeRating_${i}`).value; await api('grades/update', data); showToast(t('save'), 'success'); }

async function loadAdminSchedules() { const list = await api('schedules'); let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-clock"></i></div>${t('schedules')}</div></div>`; html += '<div class="table-wrapper"><table><thead><tr>'; html += `<th>${t('day')}</th><th>${t('time')}</th><th>${t('group')}</th><th>${t('subject')}</th><th>${t('teacher')}</th><th>${t('status')}</th></tr></thead><tbody id="schedulesTableBody"></tbody></table></div></div>`; document.getElementById('sec_adminSchedules').innerHTML = html; const tb = document.getElementById('schedulesTableBody'); if (!tb) return; if (!list || !list.length) { tb.innerHTML = `<tr><td colspan="6">${emptyState('fa-clock', t('noSchedules'))}</td></tr>`; return; } tb.innerHTML = list.map(s => { const statusBadge = s.status === 'نشط' ? badge(t('active'), 'badge-success') : badge(t('inactive'), 'badge-danger'); return `<tr><td>${safeVal(s.day)}</td><td>${safeVal(s.time)}</td><td>${safeVal(s.group)}</td><td>${safeVal(s.subject)}</td><td>${safeVal(s.teacher)}</td><td>${statusBadge}</td></tr>`; }).join(''); }

async function loadAdminExcuses() { const list = await api('excuses'); let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-envelope-open-text"></i></div>${t('excuses')}</div></div>`; html += '<div class="table-wrapper"><table><thead><tr>'; html += `<th>ID</th><th>${t('name')}</th><th>${t('reason')}</th><th>${t('status')}</th><th></th></tr></thead><tbody id="excusesTableBody"></tbody></table></div></div>`; document.getElementById('sec_adminExcuses').innerHTML = html; const tb = document.getElementById('excusesTableBody'); if (!tb) return; if (!list || !list.length) { tb.innerHTML = `<tr><td colspan="5">${emptyState('fa-envelope-open-text', t('noData'))}</td></tr>`; return; } tb.innerHTML = list.map(e => { let statusBadge; if (e.status && e.status.includes('قيد')) statusBadge = badge(t('pending'), 'badge-warn'); else if (e.status && e.status.includes('مقبول')) statusBadge = badge(t('approved'), 'badge-success'); else statusBadge = badge(t('rejected'), 'badge-danger'); return `<tr><td>${safeVal(e.id)}</td><td>${safeVal(e.studentName)}</td><td>${safeVal(e.reason)}</td><td>${statusBadge}</td></tr>`; }).join(''); }

async function loadAdminDownloads() { let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-download"></i></div>${t('downloads')}</div>`; html += `<a href="https://docs.google.com/spreadsheets/d/${STATE.spreadsheetId}/export?format=xlsx" target="_blank" class="btn btn-accent" style="text-decoration:none"><i class="fas fa-file-excel"></i>Excel</a>`; html += '</div></div>'; document.getElementById('sec_adminDownloads').innerHTML = html; }

async function loadStudentDashboard() { const d = await api('student/dashboard', { id: STATE.studentId }); if (!d) return; let html = '<div class="stats-grid">'; html += statCard('fa-percentage', (d.attRate || 0) + '%', t('attendanceRate')); html += statCard('fa-star', d.avgGrade || '-', t('average'), 'info'); html += statCard('fa-award', d.gradeLabel || '-', t('rating'), 'gold'); html += '</div>'; document.getElementById('sec_studentDashboard').innerHTML = html; }
async function loadStudentProfile() { const p = await api('student/profile', { id: STATE.studentId }); if (!p) { document.getElementById('sec_studentProfile').innerHTML = emptyState('fa-user', t('noData')); return; } let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-user"></i></div>${t('myProfile')}</div></div>`; html += '<div class="form-row">'; html += `<div class="form-group"><label>${t('name')}</label><input class="form-input" value="${safeVal(p.name)}" readonly></div>`; html += `<div class="form-group"><label>${t('grade')}</label><input class="form-input" value="${safeVal(p.grade)}" readonly></div>`; html += `<div class="form-group"><label>${t('group')}</label><input class="form-input" value="${safeVal(p.group)}" readonly></div>`; html += '</div></div>'; document.getElementById('sec_studentProfile').innerHTML = html; }
async function loadStudentGrades() { const list = await api('student/grades', { id: STATE.studentId }); const el = document.getElementById('sec_studentGrades'); if (!list || !list.length) { el.innerHTML = emptyState('fa-star', t('noGrades')); return; } const g = list[0]; let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-star"></i></div>${t('myGrades')}</div></div>`; html += '<div class="table-wrapper"><table><thead><tr>'; for (let i = 1; i <= 4; i++) html += `<th>${t('exam')} ${i}</th>`; for (let i = 1; i <= 3; i++) html += `<th>${t('homework')} ${i}</th>`; html += `<th>${t('average')}</th><th>${t('rating')}</th></tr></thead><tbody><tr>`; ['exam1', 'exam2', 'exam3', 'exam4', 'hw1', 'hw2', 'hw3'].forEach(k => { html += `<td>${safeVal(g[k])}</td>`; }); html += `<td style="font-weight:800;color:var(--accent)">${safeVal(g.avg)}</td><td>${safeVal(g.grade)}</td></tr></tbody></table></div></div>`; el.innerHTML = html; }
async function loadStudentPayments() { const list = await api('student/payments', { name: STATE.user }); const el = document.getElementById('sec_studentPayments'); if (!list || !list.length) { el.innerHTML = emptyState('fa-money-bill-wave', t('noPayments')); return; } let html = `<div class="card"><div class="table-wrapper"><table><thead><tr>`; html += `<th>${t('month')}/${t('year')}</th><th>${t('subscription')}</th><th>${t('paid')}</th><th></th></tr></thead><tbody>`; list.forEach(p => { const statusBadge = p.status && p.status.includes('مكتمل') ? badge(t('complete'), 'badge-success') : badge(t('incomplete'), 'badge-warn'); html += `<tr><td>${safeVal(p.monthYear)}</td><td>${safeVal(p.subscription)}</td><td>${safeVal(p.paid)}</td><td>${statusBadge}</td></tr>`; }); el.innerHTML = html + '</tbody></table></div></div>'; }
async function loadStudentExcuses() { let html = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon"><i class="fas fa-envelope-open-text"></i></div>${t('submitExcuse')}</div></div>`; html += `<div class="form-group"><label>${t('reason')}</label><textarea class="form-input" id="excuseReason" rows="3" placeholder="${t('enterReason')}" style="resize:vertical;min-height:80px"></textarea></div>`; html += `<button class="btn btn-accent" onclick="submitExcuse()"><i class="fas fa-paper-plane"></i>${t('submitExcuse')}</button></div>`; document.getElementById('sec_studentExcuses').innerHTML = html; }
async function submitExcuse() { const reason = getVal('excuseReason'); if (!reason) { showToast(t('enterReason'), 'error'); return; } await api('student/excuses/add', { studentId: STATE.studentId, studentName: STATE.user, reason }); showToast(t('sent'), 'success'); loadStudentExcuses(); }
async function loadStudentSchedules() { const list = await api('student/schedules'); const el = document.getElementById('sec_studentSchedules'); if (!list || !list.length) { el.innerHTML = emptyState('fa-clock', t('noSchedules')); return; } el.innerHTML = `<div class="card"><div class="table-wrapper"><table><thead><tr><th>${t('day')}</th><th>${t('time')}</th><th>${t('group')}</th><th>${t('subject')}</th></tr></thead><tbody>` + list.map(s => `<tr><td>${safeVal(s.day)}</td><td>${safeVal(s.time)}</td><td>${safeVal(s.group)}</td><td>${safeVal(s.subject)}</td></tr>`).join('') + '</tbody></table></div></div>'; }

document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') doLogin(); });
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
