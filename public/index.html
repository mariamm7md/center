<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0f1a">
  <title>Smart Educational Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0f1a; --bg2: #111827; --card: #151d2e; --card2: #1a2538;
      --border: #243047; --border2: #2d3b54; --text: #f1f5f9; --text2: #94a3b8;
      --text3: #64748b; --accent: #10b981; --accent2: #059669; --accent-g: rgba(16, 185, 129, 0.12);
      --gold: #f59e0b; --gold-g: rgba(245, 158, 11, 0.12); --danger: #ef4444;
      --danger-g: rgba(239, 68, 68, 0.12); --info: #3b82f6; --info-g: rgba(59, 130, 246, 0.12);
      --purple: #8b5cf6; --purple-g: rgba(139, 92, 246, 0.12); --cyan: #06b6d4;
      --cyan-g: rgba(6, 182, 212, 0.12); --r: 12px; --r2: 8px; --sb: 260px; --hd: 64px;
    }
    [data-theme="light"] { --bg: #f1f5f9; --bg2: #e2e8f0; --card: #ffffff; --card2: #f8fafc; --border: #cbd5e1; --border2: #94a3b8; --text: #0f172a; --text2: #475569; --text3: #64748b; --accent-g: rgba(16, 185, 129, 0.08); }
    * { margin: 0; padding: 0; box-sizing: border-box; } html { scroll-behavior: smooth; }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; line-height: 1.6; }
    ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    
    /* Animations & Keyframes */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* Login Page Styles */
    #loginPage { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .login-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%), linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%); }
    .login-pattern { position: absolute; inset: 0; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 40px 40px; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px; width: 440px; max-width: 94vw; position: relative; z-index: 10; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4); animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .login-header { text-align: center; margin-bottom: 36px; }
    .login-logo { width: 80px; height: 80px; margin: 0 auto 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 40px rgba(16, 185, 129, 0.3); }
    .login-logo svg { width: 40px; height: 40px; fill: white; }
    .login-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .login-subtitle { font-size: 13px; color: var(--text2); }
    .role-tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg2); border-radius: 14px; margin-bottom: 28px; border: 1px solid var(--border); }
    .role-tab { flex: 1; padding: 14px; border: none; border-radius: 10px; background: transparent; color: var(--text2); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .role-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35); }
    .role-tab:hover:not(.active) { color: var(--text); background: var(--accent-g); }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
    .form-input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--r2); background: var(--bg2); color: var(--text); font-family: inherit; font-size: 14px; transition: all 0.25s; outline: none; }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-g); }
    .form-input::placeholder { color: var(--text3); }
    
    /* Buttons */
    .btn { padding: 12px 20px; border: none; border-radius: var(--r2); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; }
    .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-size: 15px; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .btn-secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); background: var(--accent-g); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), #d97706); color: white; }
    .btn-sm { padding: 8px 14px; font-size: 12px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: var(--r2); }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .login-error { color: var(--danger); font-size: 12px; text-align: center; margin-top: 14px; display: none; font-weight: 600; }
    .login-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 18px; line-height: 1.8; }

    /* Main App Layout */
    #mainApp { display: none; min-height: 100vh; }
    #sidebar { position: fixed; top: 0; right: 0; width: var(--sb); height: 100vh; background: var(--card); border-left: 1px solid var(--border); z-index: 200; display: flex; flex-direction: column; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    [dir="ltr"] #sidebar { right: auto; left: 0; border-left: none; border-right: 1px solid var(--border); }
    .sb-header { padding: 22px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
    .sb-logo { width: 46px; height: 46px; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sb-logo svg { width: 24px; height: 24px; fill: white; }
    .sb-title { flex: 1; overflow: hidden; }
    .sb-title span { font-size: 16px; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-title small { font-size: 10px; color: var(--text2); }
    .sb-nav { flex: 1; overflow-y: auto; padding: 14px 10px; }
    .nav-section { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; padding: 18px 14px 8px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--r2); cursor: pointer; transition: all 0.2s; color: var(--text2); font-size: 13px; font-weight: 500; margin-bottom: 3px; border: none; background: none; width: 100%; text-align: inherit; font-family: inherit; position: relative; }
    .nav-item:hover { background: var(--accent-g); color: var(--text); }
    .nav-item.active { background: var(--accent-g); color: var(--accent); font-weight: 700; }
    .nav-item.active::before { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: 4px; height: 22px; background: var(--accent); border-radius: 0 4px 4px 0; }
    [dir="ltr"] .nav-item.active::before { right: auto; left: 0; border-radius: 4px 0 0 4px; }
    .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; fill: currentColor; }
    .sb-footer { padding: 14px 10px; border-top: 1px solid var(--border); }

    /* Header */
    #topHeader { position: fixed; top: 0; right: var(--sb); left: 0; height: var(--hd); background: rgba(21, 29, 46, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 100; transition: right 0.35s, left 0.35s; }
    [data-theme="light"] #topHeader { background: rgba(255, 255, 255, 0.92); }
    [dir="ltr"] #topHeader { right: 0; left: var(--sb); }
    .hdr-left { display: flex; align-items: center; gap: 18px; }
    .hamburger { display: none; width: 44px; height: 44px; border: 1px solid var(--border); border-radius: var(--r2); background: var(--card); color: var(--text); cursor: pointer; align-items: center; justify-content: center; transition: all 0.25s; }
    .hamburger:hover { border-color: var(--accent); color: var(--accent); }
    .page-title { font-size: 17px; font-weight: 700; }
    .hdr-right { display: flex; align-items: center; gap: 12px; }
    .hdr-btn { width: 44px; height: 44px; border-radius: var(--r2); border: 1px solid var(--border); background: var(--card); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s; position: relative; }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-g); }
    .hdr-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .notification-badge { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: none; }
    .notification-badge.show { display: block; }
    
    /* Notification Dropdown */
    .notification-dropdown { position: absolute; top: 100%; left: 0; width: 320px; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: none; flex-direction: column; max-height: 400px; overflow-y: auto; z-index: 1000; margin-top: 10px; }
    [dir="ltr"] .notification-dropdown { left: auto; right: 0; }
    .notification-dropdown.show { display: flex; }
    .notif-header { padding: 14px; border-bottom: 1px solid var(--border); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .notif-item { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; transition: background 0.2s; }
    .notif-item:hover { background: var(--bg2); }
    .notif-item.unread { background: var(--accent-g); }
    .notif-time { font-size: 10px; color: var(--text3); margin-top: 4px; }

    .user-badge { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--accent-g); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: var(--r2); font-size: 13px; font-weight: 600; color: var(--accent); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* Main Content */
    #mainContent { margin-top: var(--hd); margin-inline-start: var(--sb); padding: 28px; min-height: calc(100vh - var(--hd)); transition: margin 0.35s; position: relative; z-index: 1; }
    .section { display: none; animation: fadeIn 0.4s ease-out; }
    .section.active { display: block; }

    /* Cards & Stats */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 28px; margin-bottom: 24px; transition: all 0.3s; }
    .card:hover { border-color: var(--border2); }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 14px; }
    .card-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
    .card-icon { width: 40px; height: 40px; border-radius: var(--r2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon svg { width: 20px; height: 20px; fill: currentColor; }
    .card-icon.accent { background: var(--accent-g); color: var(--accent); }
    .card-icon.gold { background: var(--gold-g); color: var(--gold); }
    .card-icon.danger { background: var(--danger-g); color: var(--danger); }
    .card-icon.info { background: var(--info-g); color: var(--info); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; position: relative; overflow: hidden; transition: all 0.3s; }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25); border-color: var(--border2); }
    .stat-card::before { content: ''; position: absolute; top: 0; right: 0; left: 0; height: 4px; background: var(--accent); }
    .stat-card.gold::before { background: var(--gold); }
    .stat-card.danger::before { background: var(--danger); }
    .stat-card.info::before { background: var(--info); }
    .stat-label { font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; position: relative; z-index: 1; }
    .stat-value { font-size: 32px; font-weight: 900; letter-spacing: -1px; position: relative; z-index: 1; }

    /* Tables */
    .table-wrapper { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--bg2); }
    th { padding: 14px 16px; text-align: center; font-weight: 700; color: var(--text2); font-size: 11px; white-space: nowrap; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.3px; }
    td { padding: 13px 16px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { transition: all 0.2s; }
    tbody tr:hover { background: var(--accent-g); }
    tbody tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-success { background: var(--accent-g); color: var(--accent); }
    .badge-danger { background: var(--danger-g); color: var(--danger); }
    .badge-warn { background: var(--gold-g); color: var(--gold); }
    .badge-info { background: var(--info-g); color: var(--info); }

    /* Modal & Toast */
    .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
    .modal.show { display: flex; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5); animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 14px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .modal-actions { display: flex; gap: 12px; margin-top: 28px; justify-content: flex-end; }
    #toast { position: fixed; top: 85px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast-item { padding: 16px 28px; border-radius: var(--r2); font-size: 14px; font-weight: 600; min-width: 300px; text-align: center; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4); animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: auto; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .toast-item.success { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .toast-item.error { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }

    /* Search & Filters */
    .search-box { position: relative; max-width: 300px; }
    .search-box input { padding-right: 40px; }
    [dir="ltr"] .search-box input { padding-right: 16px; padding-left: 40px; }
    .search-box svg { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; fill: var(--text3); }
    [dir="ltr"] .search-box svg { right: auto; left: 14px; }

    /* Chart Container */
    .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px; }

    /* Responsive */
    @media (max-width: 900px) {
      #sidebar { transform: translateX(100%); } #sidebar.open { transform: translateX(0); }
      [dir="ltr"] #sidebar { transform: translateX(-100%); } [dir="ltr"] #sidebar.open { transform: translateX(0); }
      #topHeader { right: 0 !important; left: 0 !important; }
      #mainContent { margin-inline-start: 0 !important; padding: 18px; }
      .hamburger { display: flex; }
    }
    @media (max-width: 500px) { .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div id="toast"></div>
<div id="loader"><div class="spinner"></div><div class="loader-text" id="loaderText">Loading...</div></div>

<!-- Login Page -->
<div id="loginPage">
  <div class="login-bg"></div>
  <div class="login-pattern"></div>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3z"/></svg></div>
      <h1 class="login-title" id="loginTitle">Smart Educational Center</h1>
      <p class="login-subtitle" id="loginSubtitle">Management System</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" id="tabAdmin" onclick="setLoginRole('admin')">Admin</button>
      <button class="role-tab" id="tabStudent" onclick="setLoginRole('student')">Student</button>
    </div>
    <div id="adminLogin">
      <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="inputUser" placeholder="admin"></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="inputPass" type="password" placeholder="********"></div>
    </div>
    <div id="studentLogin" style="display:none">
      <div class="form-group"><label class="form-label">Student ID</label><input class="form-input" id="inputSid" type="number" placeholder="1"></div>
      <div class="form-group"><label class="form-label">Verification Code (Last 4 digits of ID)</label><input class="form-input" id="inputCode" type="password" placeholder="1234"></div>
      <p class="login-hint">Enter last 4 digits of your National ID</p>
    </div>
    <button class="btn btn-primary" id="btnLogin" onclick="doLogin()">Login</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Main App -->
<div id="mainApp">
  <aside id="sidebar">
    <div class="sb-header">
      <div class="sb-logo"><svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3z"/></svg></div>
      <div class="sb-title"><span id="sbTitle">Smart Center</span><small>Management System</small></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-footer">
      <button class="nav-item" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg><span>Logout</span></button>
    </div>
  </aside>
  <div id="sidebarOverlay" onclick="toggleSidebar()"></div>
 
  <header id="topHeader">
    <div class="hdr-left">
      <button class="hamburger" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
      <h2 class="page-title" id="pageTitle">Dashboard</h2>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="toggleLang()" title="Language"><svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg></button>
      <button class="hdr-btn" onclick="toggleTheme()" id="themeBtn" title="Theme"><svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg></button>
      
      <div class="hdr-btn" onclick="toggleNotifications()" id="notifBtn">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <div class="notification-badge" id="notifBadge"></div>
        <div class="notification-dropdown" id="notifDropdown">
            <div class="notif-header">Notifications <span style="cursor:pointer;font-size:11px" onclick="markAllRead()">Mark all read</span></div>
            <div id="notifList"></div>
        </div>
      </div>

      <div class="user-badge">

// --- UI Helpers ---
function showToast(msg, type = 'success') { const c = document.getElementById('toast'); const d = document.createElement('div'); d.className = `toast-item ${type}`; d.innerHTML = (type === 'error' ? ICONS.x : ICONS.check) + msg; c.appendChild(d); setTimeout(() => { d.style.opacity = '0'; setTimeout(() => d.remove(), 300); }, 4000); }
function showLoader(msg) { document.getElementById('loaderText').textContent = msg || 'Loading...'; document.getElementById('loader').style.display = 'flex'; }
function hideLoader() { document.getElementById('loader').style.display = 'none'; }
function showModal(html) { document.getElementById('modalBox').innerHTML = html; document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function badge(text, cls) { return `<span class="badge ${cls}">${text}</span>`; }
function statCard(val, label, cls = '') { return `<div class="stat-card ${cls}"><div class="stat-label">${label}</div><div class="stat-value">${val}</div></div>`; }
function emptyState(msg) { return `<div style="text-align:center;padding:40px;color:var(--text3)">${msg}</div>`; }

// --- API Wrapper ---
async function api(action, data, method) {
  showLoader();
  let url = '/api/' + action;
  const opts = { headers: { 'Content-Type': 'application/json' } };
  const writeActions = ['verifyLogin', 'students/add', 'students/update', 'payments/add', 'payments/edit', 'attendance/mark', 'excuses/add', 'student/updateProfile'];
  
  if (method === 'GET' || (!method && !writeActions.includes(action))) {
    if (data) url += '?' + new URLSearchParams(data).toString();
    opts.method = 'GET';
  } else {
    opts.method = method || 'POST';
    opts.body = JSON.stringify(data || {});
  }
  
  try {
    const res = await fetch(url, opts);
    const json = await res.json();
    hideLoader();
    if (json.success === false) { showToast(json.message || 'Error', 'error'); return null; }
    return json.data !== undefined ? json.data : json;
  } catch (err) {
    hideLoader();
    showToast('Connection error', 'error');
    console.error(err);
    return null;
  }
}

  loginRole = role;
  document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));

async function doLogin() {
  const btn = document.getElementById('btnLogin'); btn.disabled = true;
  let payload = { role: loginRole };
  if (loginRole === 'admin') {
    payload.user = getVal('inputUser'); payload.pass = getVal('inputPass');
    if (!payload.user || !payload.pass) { showToast('Missing fields', 'error'); btn.disabled = false; return; }
  } else {
    payload.user = getVal('inputSid'); payload.pass = getVal('inputCode');
    if (!payload.user || !payload.pass) { showToast('Missing fields', 'error'); btn.disabled = false; return; }
  }
  const result = await api('verifyLogin', payload); btn.disabled = false;
  if (result) {
    STATE.role = result.role; STATE.user = result.name || ''; STATE.userId = result.id || null;
    document.getElementById('loginPage').style.display = 'none'; document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userName').textContent = STATE.user;
    if(result.photo) document.getElementById('userAvatar').innerHTML = `<img src="${result.photo}" alt="avatar">`;
    else document.getElementById('userAvatar').textContent = STATE.user.charAt(0);
    
    buildNav();
    navigateTo(STATE.role === 'student' ? 'studentDashboard' : 'dashboard');
    if (STATE.role === 'student') loadNotifications();
  }
}

// --- Payments (Fixed Logic) ---
async function loadPayments() {
  const students = await api('students');
  let html = `<div class="card"><div class="card-header"><div class="card-title">${ICONS.money} ${t('payments')}</div></div>`;
  html += `<div class="form-row">
    <div class="form-group"><select class="form-input" id="payStudent">${(students || []).map(s => `<option value="${s.id}" data-sub="${s.subscription}">${s.name}</option>`).join('')}</select></div>
    <div class="form-group"><select class="form-input" id="payMonth">${CONFIG.months[STATE.lang].map(m => `<option>${m}</option>`).join('')}</select></div>
    <div class="form-group"><input class="form-input" id="payAmount" type="number" placeholder="${t('amount')}"></div>
    <button class="btn btn-primary" onclick="addPayment()">Pay</button>
  </div>`;
  
  // Display Logic: Grouped by Student
  const payments = await api('payments');
  const grouped = {};
  (payments || []).forEach(p => {
    if(!grouped[p.studentId]) grouped[p.studentId] = { name: p.name, subscription: p.subscription, totalPaid: 0, records: [] };
    grouped[p.studentId].totalPaid += parseFloat(p.paid) || 0;
    grouped[p.studentId].records.push(p);
  });

  html += `<div class="table-wrapper"><table><thead><tr><th>Student</th><th>Required</th><th>Paid</th><th>Remaining</th><th>Status</th><th></th></tr></thead><tbody>`;
  Object.keys(grouped).forEach(id => {
    const g = grouped[id];
    const remaining = g.subscription - g.totalPaid;
    const status = remaining <= 0 ? badge('Complete', 'badge-success') : badge('Incomplete', 'badge-warn');
    html += `<tr>
      <td>${g.name}</td><td>${g.subscription}</td><td>${g.totalPaid}</td><td>${Math.max(0, remaining)}</td><td>${status}</td>
      <td><button class="btn btn-sm btn-secondary" onclick="viewPayments('${id}')">Details</button></td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';
  document.getElementById('sec_payments').innerHTML = html;
}
async function addPayment() {
  const sel = document.getElementById('payStudent');
  const id = sel.value;
  const name = sel.options[sel.selectedIndex].text;
  const sub = sel.options[sel.selectedIndex].dataset.sub;
  await api('payments/add', { studentId: id, studentName: name, month: getVal('payMonth'), amount: getVal('payAmount'), subscription: sub });
  showToast(t('save')); loadPayments();
}
function viewPayments(id) {
    const p = STATE.cache.payments ? STATE.cache.payments.filter(x => x.studentId == id) : [];
    // Simple modal list of payment history
    showModal(`<div class="modal-title">Payment History</div><div>${p.map(x => `<div>${x.month}: ${x.paid}</div>`).join('') || 'No records'}</div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Close</button></div>`);
}

  renderGradesRows(list);

function renderGradesRows(list) {
  const tb = document.getElementById('gradesBody');
  if(!tb) return;
  tb.innerHTML = (list || []).map(g => {
    const avg = ((parseFloat(g.exam1)||0) + (parseFloat(g.exam2)||0) + (parseFloat(g.exam3)||0)) / 3;
    return `<tr>
      <td>${g.name}</td>
      <td><input class="form-input" style="width:60px" value="${g.exam1}" onchange="updateGradeField('${g.id}', 'exam1', this.value)"></td>
      <td><input class="form-input" style="width:60px" value="${g.exam2}" onchange="updateGradeField('${g.id}', 'exam2', this.value)"></td>
      <td><input class="form-input" style="width:60px" value="${g.exam3}" onchange="updateGradeField('${g.id}', 'exam3', this.value)"></td>
      <td><input class="form-input" style="width:60px" value="${g.exam4}" onchange="updateGradeField('${g.id}', 'exam4', this.value)"></td>
      <td>${avg.toFixed(1)}</td>
    </tr>`;
  }).join('');
}
function filterGrades(q) {
  const filtered = STATE.cache.grades.filter(g => g.name.toLowerCase().includes(q.toLowerCase()));
  renderGradesRows(filtered);
}
async function updateGradeField(id, field, val) {
  await api('grades/update', { id, field, val });
  showToast('Updated');
}

// --- Attendance ---
async function loadAttendance() {
  const students = await api('students');
  const date = new Date();
  const today = date.toLocaleDateString('en-US');
  let html = `<div class="card"><div class="card-header"><div class="card-title">${ICONS.check} ${t('attendance')} - ${today}</div></div>`;
  html += `<div class="table-wrapper"><table><thead><tr><th>Name</th><th>Group</th><th>Status</th></tr></thead><tbody>`;
  students.forEach(s => {
    html += `<tr><td>${s.name}</td><td>${s.group}</td><td>
      <div class="btn-group">
        <button class="btn btn-sm btn-secondary" onclick="markAttendance(${s.id}, 'present')">${t('present')}</button>
        <button class="btn btn-sm btn-danger" onclick="markAttendance(${s.id}, 'absent')">${t('absent')}</button>
      </div>
    </td></tr>`;
  });
  html += '</tbody></table></div></div>';
  document.getElementById('sec_attendance').innerHTML = html;
}
async function markAttendance(id, status) {
  await api('attendance/mark', { studentId: id, status, date: new Date().toISOString().split('T')[0] });
  showToast(t('save'));
}

// --- Admin Excuses ---
async function loadAdminExcuses() {
  const list = await api('excuses');
  let html = `<div class="card"><div class="card-header"><div class="card-title">${ICONS.mail} ${t('excuses')}</div></div>`;
  html += `<div class="table-wrapper"><table><thead><tr><th>Student</th><th>Reason</th><th>Status</th><th></th></tr></thead><tbody>`;
  (list || []).forEach(e => {
     const statusBadge = e.status === 'Pending' ? badge('Pending', 'badge-warn') : badge(e.status, e.status === 'Approved' ? 'badge-success' : 'badge-danger');
     html += `<tr><td>${e.studentName}</td><td>${e.reason}</td><td>${statusBadge}</td>
     <td><div class="btn-group"><button class="btn btn-sm btn-secondary" onclick="replyExcuse('${e.id}', 'Approved')">Accept</button><button class="btn btn-sm btn-danger" onclick="replyExcuse('${e.id}', 'Rejected')">Reject</button></div></td></tr>`;
  });
  html += '</tbody></table></div></div>';
  document.getElementById('sec_excuses').innerHTML = html;
}
async function replyExcuse(id, status) {
  await api('excuses/update', { id, status });
  showToast('Updated'); loadAdminExcuses();
}

// ============================================= STUDENT PAGES =============================================
async function loadStudentDashboard() {
  const d = await api('student/dashboard', { id: STATE.userId });
  let html = `<div class="stats-grid">`;
  html += statCard((d.attRate || 85) + '%', t('attendance'));
  html += statCard(d.avgGrade || '-', t('grades'), 'gold');
  html += statCard(d.rank || '-', t('ranking'), 'info');
  html += '</div>';
  
  // Chart
  html += `<div class="card"><div class="card-title">${ICONS.chart} ${t('chart')}</div><div class="chart-container"><canvas id="gradeChart"></canvas></div></div>`;
  document.getElementById('sec_studentDashboard').innerHTML = html;
  
  // Render Chart
  if(d.chartData) {
    new Chart(document.getElementById('gradeChart'), {
      type: 'line',
      data: {
        labels: ['S1', 'S2', 'S3', 'Final'],
        datasets: [{
          label: 'Your Grades',
          data: [d.chartData.s1, d.chartData.s2, d.chartData.s3, d.chartData.final],
          borderColor: '#10b981',
          tension: 0.3
        }, {
          label: 'Class Avg',
          data: d.classAvg || [0,0,0,0],
          borderColor: '#64748b',
          borderDash: [5,5],
          tension: 0.3
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
    });
  }
}

async function loadStudentGrades() {
  const g = await api('student/grades', { id: STATE.userId });
  let html = `<div class="card"><div class="card-title">${ICONS.star} ${t('grades')}</div>`;
  if(!g || !g.length) html += emptyState(t('noData'));
  else {
    html += `<table class="table-wrapper"><tr><th>S1</th><th>S2</th><th>S3</th><th>Final</th></tr><tr>
    <td>${g[0].exam1}</td><td>${g[0].exam2}</td><td>${g[0].exam3}</td><td>${g[0].exam4}</td></tr></table>`;
  }
  html += '</div>';
  document.getElementById('sec_studentGrades').innerHTML = html;
}

async function loadStudentPayments() {
  const p = await api('student/payments', { id: STATE.userId }); // Backend handles ID->Name lookup
  let html = `<div class="card"><div class="card-title">${ICONS.money} ${t('payments')}</div>`;
  if(!p || !p.length) html += emptyState(t('noData'));
  else {
    html += `<div class="table-wrapper"><table><thead><tr><th>Month</th><th>Amount</th><th>Status</th></tr></thead><tbody>`;
    p.forEach(r => {
       html += `<tr><td>${r.month}</td><td>${r.paid}</td><td>${badge(r.status, r.status === 'Complete' ? 'badge-success' : 'badge-warn')}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';
  document.getElementById('sec_studentPayments').innerHTML = html;
}

async function loadStudentAttendance() {
  const a = await api('student/attendance', { id: STATE.userId });
  let html = `<div class="card"><div class="card-title">${ICONS.check} ${t('attendance')}</div>`;
  if(!a || !a.length) html += emptyState(t('noData'));
  else {
    html += `<div class="table-wrapper"><table><thead><tr><th>Date</th><th>Status</th></tr></thead><tbody>`;
    a.forEach(r => {
       html += `<tr><td>${r.date}</td><td>${badge(r.status, r.status === 'Present' ? 'badge-success' : 'badge-danger')}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';
  document.getElementById('sec_studentAttendance').innerHTML = html;
}

async function loadStudentExcuse() {
  let html = `<div class="card"><div class="card-title">${ICONS.mail} ${t('sendExcuse')}</div>`;
  html += `<div class="form-group"><textarea class="form-input" id="excuseReason" placeholder="${t('reason')}"></textarea></div>`;
  html += `<button class="btn btn-primary" onclick="sendExcuse()">Send</button></div>`;
  
  html += `<div class="card" style="margin-top:20px"><div class="card-title">History</div><div id="excuseHistory"></div></div>`;
  document.getElementById('sec_studentExcuse').innerHTML = html;
  
  const history = await api('student/excuses', { id: STATE.userId });
  document.getElementById('excuseHistory').innerHTML = (history || []).map(e => `<div style="padding:10px;border-bottom:1px solid var(--border)"><b>${e.status}</b><br>${e.reason}<br><small>${e.reply || ''}</small></div>`).join('') || 'No history';
}
async function sendExcuse() {
  const reason = getVal('excuseReason');
  if(!reason) return;
  await api('excuses/add', { studentId: STATE.userId, reason });
  showToast(t('save'));
  loadStudentExcuse();
}

async function loadStudentProfile() {
  const p = await api('student/profile', { id: STATE.userId });
  let html = `<div class="card"><div class="card-title">Profile</div>`;
  html += `<div style="text-align:center;margin-bottom:20px"><div class="user-avatar" style="width:80px;height:80px;margin:0 auto;font-size:30px" id="profImg">${STATE.user.charAt(0)}</div><br>
  <input type="file" id="photoUpload" accept="image/*" onchange="uploadPhoto(this)"></div>`;
  html += `<div class="form-group"><label>Name</label><input class="form-input" id="profName" value="${p.name}"></div>`;
  html += `<button class="btn btn-primary" onclick="updateProfile()">Update</button></div>`;
  document.getElementById('sec_studentProfile').innerHTML = html;
  if(p.photo) document.getElementById('profImg').innerHTML = `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
}
async function uploadPhoto(input) {
  if (input.files && input.files[0]) {
    var reader = new FileReader();
    reader.onload = function (e) {
      document.getElementById('profImg').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      STATE.cache.newPhoto = e.target.result; // Temp store
    };
    reader.readAsDataURL(input.files[0]);
  }
}
async function updateProfile() {
  const name = getVal('profName');
  const photo = STATE.cache.newPhoto;
  await api('student/updateProfile', { id: STATE.userId, name, photo });
  showToast(t('save'));
  STATE.user = name;
  document.getElementById('userName').textContent = name;
  if(photo) document.getElementById('userAvatar').innerHTML = `<img src="${photo}" alt="avatar">`;
}

// Init
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') doLogin(); });
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

</script>
