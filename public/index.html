async function updateExc(id,status){var reply=await promptDlg(t('enterReply'));await api('excuses/update',{id:id,status:status,reply:reply||''});toast('OK','s');loadAExc()}

async function loadAlert(){var list=await api('alerts');var el=document.getElementById('sec_aalerts');if(!list||!list.length){el.innerHTML='<div class="cd" style="text-align:center;padding:50px"><div style="font-size:48px;color:var(--accent);margin-bottom:12px"><i class="fas fa-check-circle"></i></div><p style="color:var(--text2);font-size:14px;font-weight:600">'+t('noAlerts')+'</p></div>';return}el.innerHTML=list.map(function(a){return'<div class="ac"><div><strong style="font-size:14px">'+sv(a.name)+'</strong> — '+t('absentToday')+'<br><small style="color:var(--text3)">'+sv(a.whatsapp)+'</small></div><a href="https://wa.me/+20'+sv(a.whatsapp)+'?text='+encodeURIComponent(sv(a.message))+'" target="_blank" class="btn ba"><i class="fab fa-whatsapp"></i>'+t('sendWhatsapp')+'</a></div>'}).join('')}

async function loadDL(){var h='<div class="cd"><div class="ch"><div class="ct"><div class="ct-icon"><i class="fas fa-download"></i></div>'+t('downloads')+'</div><a href="https://docs.google.com/spreadsheets/d/'+SID+'/export?format=xlsx" target="_blank" class="btn ba"><i class="fas fa-file-excel"></i>Excel</a></div><div id="dlList"></div></div>';document.getElementById('sec_adownloads').innerHTML=h;var list=await api('sheets');var el=document.getElementById('dlList');if(!el)return;el.innerHTML=list.map(function(s){return'<div class="dlc" onclick="window.open(\'https://docs.google.com/spreadsheets/d/'+SID+'/export?format=xlsx&gid='+s.gid+'\',\'_blank\')"><span><i class="fas fa-file-excel"></i>'+sv(s.name)+'</span><button class="btn bs ba"><i class="fas fa-download"></i>'+t('downloadSheet')+'</button></div>'}).join('')}

async function loadSDash(){var d=await api('student/dashboard',{id:S.studentId});if(!d)return;var h='<div class="ph"><div class="pav">'+(S.user||'?')[0]+'</div><div><div class="pn">'+sv(S.user)+'</div><div class="ps">'+t('myDashboard')+'</div></div></div><div class="sg">';h+=stC('fa-percentage',(d.attRate||0)+'%',t('attendanceRate'),'');h+=stC('fa-check-circle',sv(d.present),t('present'),'gd');h+=stC('fa-times-circle',sv(d.absent),t('absent'),'dg');h+=stC('fa-clock',sv(d.late),t('late'),'wg');h+=stC('fa-star',sv(d.avgGrade),t('average'),'ig');h+=stC('fa-award',sv(d.gradeLabel),t('rating'),'gd');h+=stC('fa-money-bill-wave',sv(d.unpaidCount),t('unpaid'),'dg');h+=stC('fa-calendar',sv(d.month),t('currentMonth'),'wg');h+='</div><div class="cd"><div class="ch"><div class="ct"><div class="ct-icon"><i class="fas fa-bolt"></i></div>'+t('quickActions')+'</div></div><div class="qa">';h+='<button class="qab" onclick="goTo(\'sattendance\')"><i class="fas fa-calendar-check"></i><span>'+t('markAttendance')+'</span></button>';h+='<button class="qab" onclick="goTo(\'sexcuses\')"><i class="fas fa-envelope-open-text"></i><span>'+t('submitExcuse')+'</span></button>';h+='<button class="qab" onclick="goTo(\'sgrades\')"><i class="fas fa-star"></i><span>'+t('myGrades')+'</span></button>';h+='<button class="qab" onclick="goTo(\'spayments\')"><i class="fas fa-money-bill-wave"></i><span>'+t('myPayments')+'</span></button>';h+='</div></div>';document.getElementById('sec_sdash').innerHTML=h}

async function loadSProf(){var p=await api('student/profile',{id:S.studentId});if(!p){document.getElementById('sec_sprofile').innerHTML=emptyS('fa-user',t('noData'));return}var h='<div class="ph"><div class="pav">'+sv(p.name)[0]+'</div><div><div class="pn">'+sv(p.name)+'</div><div class="ps">ID: '+sv(p.id)+' | '+sv(p.grade)+' | '+sv(p.group)+'</div></div></div><div class="cd"><div class="ch"><div class="ct"><div class="ct-icon"><i class="fas fa-user-edit"></i></div>'+t('editProfile')+'</div></div><div class="fr"><div class="fg"><label>'+t('phone')+'</label><input class="fi" id="prPh" value="'+sv(p.studentPhone)+'"></div><div class="fg"><label>WhatsApp</label><input class="fi" id="prWa" value="'+sv(p.whatsapp)+'"></div><div class="fg"><label>'+t('phone2')+'</label><input class="fi" id="prPh2" value="'+sv(p.phone2)+'"></div></div><button class="btn ba" onclick="saveProf()"><i class="fas fa-save"></i>'+t('save')+'</button></div><div class="cd"><div class="fr"><div class="fg"><label>'+t('grade')+'</label><input class="fi" value="'+sv(p.grade)+'" readonly></div><div class="fg"><label>'+t('subject')+'</label><input class="fi" value="'+sv(p.subject)+'" readonly></div><div class="fg"><label>'+t('group')+'</label><input class="fi" value="'+sv(p.group)+'" readonly></div></div><div class="fr"><div class="fg"><label>'+t('subscription')+'</label><input class="fi" value="'+sv(p.subscription)+'" readonly></div><div class="fg"><label>'+t('parentName')+'</label><input class="fi" value="'+sv(p.parentName)+'" readonly></div><div class="fg"><label>'+t('status')+'</label><input class="fi" value="'+sv(p.status)+'" readonly></div></div></div>';document.getElementById('sec_sprofile').innerHTML=h}
async function saveProf(){await api('student/profile/update',{studentId:S.studentId,studentPhone:gv('prPh'),whatsapp:gv('prWa'),phone2:gv('prPh2')});toast(t('profileUpdated'),'s')}

async function loadSAtt(){var d=await api('student/attendance',{id:S.studentId});if(!d){document.getElementById('sec_sattendance').innerHTML=emptyS('fa-calendar',t('noData'));return}var today=new Date().getDate(),tv=d.days?d.days[today-1]||'':'';var h='<div class="cd"><div class="ch"><div class="ct"><div class="ct-icon"><i class="fas fa-calendar-check"></i></div>'+t('myAttendance')+' — '+sv(d.month)+'</div>';if(!tv){h+='<div class="bgrp"><button class="btn ba" onclick="markAtt(\'ح\')"><i class="fas fa-check"></i>'+t('markAttendance')+'</button><button class="btn bd" onclick="markAtt(\'غ\')"><i class="fas fa-times"></i>'+t('markAbsent')+'</button></div>'}else{var bc=tv==='ح'?'bp-s':tv==='غ'?'ba-s':'bw-s';h+='<span class="badge '+bc+'">'+(tv==='ح'?t('present'):tv==='غ'?t('absent'):t('late'))+'</span>'}h+='</div><div class="ag">';for(var i=0;i<31;i++){var v=(d.days&&d.days[i])||'',cls=v==='ح'?' p':v==='غ'?' a':v==='ت'?' l':'',tc=i===today-1?' today':'';h+='<div class="ad'+cls+tc+'"><div class="dn">'+(i+1)+'</div><div>'+(v||'-')+'</div></div>'}h+='</div></div>';var pr=0,ab=0,lt=0;if(d.days)d.days.forEach(function(v){if(v==='ح')pr++;if(v==='غ')ab++;if(v==='ت')lt++});var total=pr+ab+lt;h+='<div class="sg">';h+=stC('fa-percentage',(total?((pr/total)*100).toFixed(0):0)+'%',t('attendanceRate'),'');h+=stC('fa-check-circle',pr,t('present'),'gd');h+=stC('fa-times-circle',ab,t('absent'),'dg');h+=stC('fa-clock',lt,t('late'),'wg');h+='</div>';document.getElementById('sec_sattendance').innerHTML=h}
async function markAtt(status){await api('student/attendance/mark',{studentId:S.studentId,status:status});toast(status==='ح'?t('markedPresent'):t('markedAbsent'),'s');loadSAtt()}

async function loadSGr(){var list=await api('student/grades',{id:S.studentId});var el=document.getElementById('sec_sgrades');if(!list||!list.length){el.innerHTML=emptyS('fa-star',t('noGrades'));return}var g=list[0];var h='<div class="ph"><div class="pav"><i class="fas fa-star"></i></div><div><div class="pn">'+sv(g.name)+'</div><div class="ps">'+t('average')+': '+sv(g.avg)+' | '+t('rating')+': '+sv(g.grade)+'</div></div></div><div class="sg">'+stC('fa-star',sv(g.avg),t('average'),'ig')+stC('fa-award',sv(g.grade),t('rating'),'gd')+'</div><div class="cd"><div class="tw"><table><thead><tr>';for(var i=1;i<=4;i++)h+='<th>'+t('exam')+' '+i+'</th>';for(var i=1;i<=3;i++)h+='<th>'+t('homework')+' '+i+'</th>';h+='</tr></thead><tbody><tr>';['exam1','exam2','exam3','exam4','hw1','hw2','hw3'].forEach(function(k){var v=g[k]===''?'-':sv(g[k]);h+='<td'+(v!=='-'?' style="color:var(--accent);font-weight:800"':'')+'>'+v+'</td>'});h+='</tr></tbody></table></div></div>';el.innerHTML=h}

async function loadSPay(){var list=await api('student/payments',{name:S.user});var el=document.getElementById('sec_spayments');if(!list||!list.length){el.innerHTML=emptyS('fa-money-bill-wave',t('noPayments'));return}var h='<div class="cd"><div class="tw"><table><thead><tr><th>'+t('month')+'/'+t('year')+'</th><th>'+t('subscription')+'</th><th>'+t('paid')+'</th><th>'+t('remaining')+'</th><th>'+t('status')+'</th></tr></thead><tbody>';list.forEach(function(p){var bg=p.status&&p.status.includes('مكتمل')?badgeS(t('paidFull'),'bp-s'):badgeS(t('paidNot'),'bw-s');h+='<tr><td>'+sv(p.monthYear)+'</td><td>'+sv(p.subscription)+'</td><td>'+sv(p.paid)+'</td><td>'+sv(p.remaining)+'</td><td>'+bg+'</td></tr>'});h+='</tbody></table></div></div>';el.innerHTML=h}

async function loadSExc(){var h='<div class="cd"><div class="ch"><div class="ct"><div class="ct-icon"><i class="fas fa-envelope-open-text"></i></div>'+t('submitExcuse')+'</div></div><div class="fg"><label>'+t('reason')+'</label><textarea class="fi" id="exReason" rows="3" placeholder="'+t('enterReason')+'"></textarea></div><button class="btn ba" onclick="submitExc()"><i class="fas fa-paper-plane"></i>'+t('submitExcuse')+'</button></div><div id="myExList"></div>';document.getElementById('sec_sexcuses').innerHTML=h;var list=await api('student/excuses',{id:S.studentId});var el=document.getElementById('myExList');if(!el)return;if(!list||!list.length){el.innerHTML=emptyS('fa-envelope-open-text',t('noExcuses'));return}var out='<div class="cd">';list.forEach(function(e){var bg=e.status&&e.status.includes('قيد')?badgeS(t('pending'),'bw-s'):e.status&&e.status.includes('مقبول')?badgeS(t('approved'),'bp-s'):badgeS(t('rejected'),'ba-s');out+='<div style="padding:14px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong>'+sv(e.date)+'</strong>'+bg+'</div><p style="color:var(--text2);font-size:13px;line-height:1.7">'+sv(e.reason)+'</p>';if(e.reply&&e.reply!=='')out+='<p style="color:var(--accent);font-size:12px;margin-top:6px"><strong>'+t('reply')+':</strong> '+sv(e.reply)+'</p>';out+='</div>'});out+='</div>';el.innerHTML=out}
async function submitExc(){var reason=gv('exReason');if(!reason){toast(t('enterReason'),'error');return}await api('student/excuses/add',{studentId:S.studentId,studentName:S.user,reason:reason});toast(t('excuseSent'),'s');loadSExc()}

async function loadSSk(){var list=await api('student/schedules');var el=document.getElementById('sec_sschedules');if(!list||!list.length){el.innerHTML=emptyS('fa-clock',t('noSchedules'));return}el.innerHTML=list.map(function(s){return'<div class="skc"><div class="skd">'+sv(s.day)+'</div><div class="ski"><span><i class="fas fa-clock"></i>'+sv(s.time)+'</span><span><i class="fas fa-users"></i>'+sv(s.group)+'</span><span><i class="fas fa-book"></i>'+sv(s.subject)+'</span><span><i class="fas fa-chalkboard-teacher"></i>'+sv(s.teacher)+'</span></div></div>'}).join('')}

document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')handleLogin()});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM()});
</script>
