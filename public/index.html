async function loadSGr(){var list=await api('student/grades',{id:S.studentId});var el=document.getElementById('sec_sgrades');if(!list||!list.length){el.innerHTML=emptyS('fa-star',t('noGrades'));return}var g=list[0];var h='<div class="ph"><div class="pav"><i class="fas fa-star"></i></div><div><div class="pn">'+g.name+'</div><div class="ps">'+t('average')+': '+g.avg+' | '+t('rating')+': '+g.grade+'</div></div></div><div class="sg">'+stC('fa-star',''+g.avg,t('average'),'ig')+stC('fa-award',g.grade,t('rating'),'gd')+'</div><div class="cd"><div class="ch"><div class="ct"><i class="fas fa-list"></i>'+t('myGrades')+'</div></div><div class="tw"><table><thead><tr>';for(var i=1;i<=4;i++)h+='<th>'+t('exam')+' '+i+'</th>';for(var i=1;i<=3;i++)h+='<th>'+t('homework')+' '+i+'</th>';h+='</tr></thead><tbody><tr>';['exam1','exam2','exam3','exam4','hw1','hw2','hw3'].forEach(function(k){var v=g[k]===''?'-':g[k];h+='<td'+(v!=='-'?' style="color:var(--accent);font-weight:700"':'')+'>'+v+'</td>'});h+='</tr></tbody></table></div></div>';if(g.notes)h+='<div class="cd"><div class="ct"><i class="fas fa-sticky-note"></i>'+t('notes')+'</div><p style="margin-top:10px;color:var(--text2)">'+g.notes+'</p></div>';el.innerHTML=h}
async function loadSPay(){var list=await api('student/payments',{name:S.user});var el=document.getElementById('sec_spayments');if(!list||!list.length){el.innerHTML=emptyS('fa-money-bill-wave',t('noPayments'));return}var h='<div class="cd"><div class="tw"><table><thead><tr><th>'+t('month')+'/'+t('year')+'</th><th>'+t('subscription')+'</th><th>'+t('paid')+'</th><th>'+t('remaining')+'</th><th>'+t('status')+'</th><th>'+t('notes')+'</th></tr></thead><tbody>';list.forEach(function(p){var bg=p.status.includes('مكتمل')?badgeS(t('paidFull'),'bp-s'):badgeS(t('paidNot'),'bw-s');h+='<tr><td>'+p.monthYear+'</td><td>'+p.subscription+'</td><td>'+p.paid+'</td><td>'+p.remaining+'</td><td>'+bg+'</td><td>'+p.notes+'</td></tr>'});h+='</tbody></table></div></div>';el.innerHTML=h}
async function loadSExc(){var h='<div class="cd"><div class="ch"><div class="ct"><i class="fas fa-envelope-open-text"></i>'+t('submitExcuse')+'</div></div><div class="fg"><label>'+t('reason')+'</label><textarea class="fi" id="exReason" rows="3" placeholder="'+t('enterReason')+'" style="resize:vertical"></textarea></div><button class="btn ba" onclick="submitExc()"><i class="fas fa-paper-plane"></i>'+t('submitExcuse')+'</button></div><div id="myExList"></div>';document.getElementById('sec_sexcuses').innerHTML=h;var list=await api('student/excuses',{id:S.studentId});var el=document.getElementById('myExList');if(!el)return;if(!list||!list.length){el.innerHTML=emptyS('fa-envelope-open-text',t('noExcuses'));return}var out='<div class="cd">';list.forEach(function(e){var bg=e.status.includes('قيد')?badgeS(t('pending'),'bw-s'):e.status.includes('مقبول')?badgeS(t('approved'),'bp-s'):badgeS(t('rejected'),'ba-s');out+='<div style="padding:12px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><strong>'+e.date+'</strong>'+bg+'</div><p style="color:var(--text2);font-size:13px">'+e.reason+'</p>';if(e.reply)out+='<p style="color:var(--accent);font-size:12px;margin-top:4px"><strong>'+t('reply')+':</strong> '+e.reply+'</p>';out+='</div>'});out+='</div>';el.innerHTML=out}
async function submitExc(){var reason=gv('exReason');if(!reason){toast(t('enterReason'),'error');return}await api('student/excuses/add',{studentId:S.studentId,studentName:S.user,reason:reason});toast(t('excuseSent'),'s');loadSExc()}
async function loadSSk(){var list=await api('student/schedules');var el=document.getElementById('sec_sschedules');if(!list||!list.length){el.innerHTML=emptyS('fa-clock',t('noSchedules'));return}el.innerHTML=list.map(function(s){return '<div class="skc"><div class="skd">'+s.day+'</div><div class="ski"><span><i class="fas fa-clock"></i>'+s.time+'</span><span><i class="fas fa-users"></i>'+s.group+'</span><span><i class="fas fa-book"></i>'+s.subject+'</span><span><i class="fas fa-chalkboard-teacher"></i>'+s.teacher+'</span></div></div>'}).join('')}
</script>
</body>
</html>
